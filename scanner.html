<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>發票掃描系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#efefef;--text2:#909090;--text3:#505050;
  --accent:#e9ff52;--accent2:#c2d93a;
  --green:#52ffaa;--red:#ff5252;--blue:#52aaff;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.hidden{display:none!important}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
button:active{transform:scale(.97)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* ════════════════════════════
   電腦端 — QR 等待畫面
════════════════════════════ */
#desktop-wait{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  padding:2rem;
}
.wait-logo{display:flex;align-items:center;gap:12px}
.wait-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wait-logo-icon svg{width:24px;height:24px}
.wait-logo h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.wait-logo p{font-size:12px;color:var(--text2);margin-top:2px}
.qr-card{
  background:var(--bg2);border:1px solid var(--border2);border-radius:20px;
  padding:1.75rem;display:flex;flex-direction:column;align-items:center;gap:1rem;
  width:100%;max-width:320px;
}
.qr-card p{font-size:13px;color:var(--text2);text-align:center}
#qr-wrap{background:#fff;border-radius:12px;padding:10px;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
#qr-wrap canvas,#qr-wrap img{width:100%!important;height:100%!important}
.code-box{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:10px 16px;text-align:center;
}
.code-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.code-val{font-size:30px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:5px}
.wait-status{
  display:flex;align-items:center;gap:8px;font-size:13px;
  padding:10px 20px;border-radius:24px;
  background:rgba(82,170,255,.08);border:1px solid rgba(82,170,255,.2);color:var(--blue);
}
.s-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}

/* ════════════════════════════
   電腦端 — 主畫面（連線後）
════════════════════════════ */
#desktop-main{
  height:100vh;display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr auto;
  gap:0;
}

/* 左側：QR + 拍照結果 */
.left-panel{
  grid-row:1/3;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:1.25rem;gap:1rem;
  overflow:hidden;
}
.panel-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* 最新照片大圖 */
.latest-photo{
  flex:1;background:#000;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);position:relative;
  display:flex;align-items:center;justify-content:center;min-height:0;
}
.latest-photo img{width:100%;height:100%;object-fit:contain;display:none}
.latest-photo .no-photo{font-size:13px;color:var(--text3);text-align:center}

/* 縮圖列 */
.thumb-strip{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;flex-shrink:0;
}
.thumb-strip::-webkit-scrollbar{height:3px}
.thumb-strip::-webkit-scrollbar-track{background:transparent}
.thumb-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.thumb-item{
  width:56px;height:74px;border-radius:8px;overflow:hidden;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s;
}
.thumb-item:hover{border-color:var(--accent);transform:scale(1.05)}
.thumb-item.active{border-color:var(--accent);border-width:2px}
.thumb-item img{width:100%;height:100%;object-fit:cover}

/* 右上：已收到照片區域 */
.right-top{
  border-bottom:1px solid var(--border);
  padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;
  overflow:hidden;
}
.conn-bar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:9px;font-size:12px;
  background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  transition:all .2s;flex-shrink:0;
}
.conn-bar.connected{background:rgba(82,255,170,.07);border-color:rgba(82,255,170,.2);color:var(--green)}
.conn-bar.waiting{background:rgba(82,170,255,.07);border-color:rgba(82,170,255,.2);color:var(--blue)}
.conn-bar .s-dot{animation:none}
.conn-bar.connected .s-dot{animation:pulse 1.5s infinite}
.conn-bar.waiting .s-dot{animation:blink .8s infinite}

.photo-count-row{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.photo-count-row span{font-size:12px;color:var(--text3)}
.photo-grid-small{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));
  gap:6px;overflow-y:auto;flex:1;min-height:0;
}
.photo-grid-small::-webkit-scrollbar{width:3px}
.photo-grid-small::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.pg-thumb{aspect-ratio:3/4;border-radius:8px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.pg-thumb:hover{border-color:var(--border2);transform:scale(1.03)}
.pg-thumb img{width:100%;height:100%;object-fit:cover}
.pg-thumb .dl{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:9px;border-radius:4px;padding:2px 5px;cursor:pointer;display:none}
.pg-thumb:hover .dl{display:block}
.empty-grid{text-align:center;padding:1.5rem;color:var(--text3);font-size:12px;grid-column:1/-1}

/* 右下：AI 辨識結果 */
.right-bottom{
  padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;overflow-y:auto;
}
.right-bottom::-webkit-scrollbar{width:3px}
.right-bottom::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.ai-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.btn-ai-rerun{padding:5px 14px;border-radius:8px;background:var(--accent);color:#0d0d0d;font-weight:700;border:none;font-size:11px}
.btn-ai-rerun:hover{background:var(--accent2)}
.ai-fields{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ai-field{background:var(--bg3);border-radius:9px;padding:9px 11px}
.ai-field.full{grid-column:1/-1}
.af-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.af-val{font-size:13px;color:var(--text);font-weight:500;word-break:break-all}
.af-val.total{color:var(--accent);font-size:18px;font-family:'JetBrains Mono',monospace}
.ai-placeholder{text-align:center;padding:1rem;color:var(--text3);font-size:12px}
.ai-loading{text-align:center;padding:1rem;color:var(--text2);font-size:12px}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex-shrink:0}
.btn-action{padding:8px;border-radius:9px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-action:hover{background:var(--bg3)}

/* 底部：遠端拍照按鈕 */
.bottom-bar{
  grid-column:1/2;
  padding:1rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0;
}
.btn-remote{
  width:100%;padding:12px;border-radius:13px;
  background:var(--accent);color:#0d0d0d;font-size:15px;font-weight:700;
  border:none;display:flex;align-items:center;justify-content:center;gap:9px;
}
.btn-remote:hover{background:var(--accent2)}
.btn-remote.flash{animation:flashBtn .3s ease}
@keyframes flashBtn{0%{background:var(--accent)}50%{background:#fff}100%{background:var(--accent)}}

/* ════════════════════════════
   手機端
════════════════════════════ */
#phone-screen{
  min-height:100vh;display:flex;flex-direction:column;
  max-width:480px;width:100%;margin:0 auto;
}
.p-topbar{
  display:flex;align-items:center;gap:10px;
  padding:.9rem 1.25rem;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.btn-back{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;padding:0}
.btn-back:hover{background:var(--bg3)}
.btn-back svg{width:16px;height:16px;stroke:var(--text)}
.p-topbar-icon{width:34px;height:34px;border-radius:9px;background:rgba(82,255,170,.15);display:flex;align-items:center;justify-content:center}
.p-title{font-size:16px;font-weight:700}
.p-sub{font-size:11px;color:var(--text2);margin-top:1px}

.camera-wrap{margin:.75rem 1rem 0;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:3/4;position:relative;border:1px solid var(--border)}
#p-video{width:100%;height:100%;object-fit:cover;display:none}
#p-canvas{display:none}
.p-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.p-ph-icon{width:60px;height:60px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.p-ph-icon svg{width:28px;height:28px;color:var(--text3)}
.p-placeholder p{font-size:13px;color:var(--text3)}
.scan-overlay{position:absolute;inset:0;pointer-events:none;display:none}
.scan-overlay.on{display:block}
.scan-frame{position:absolute;top:10%;left:7%;right:7%;bottom:10%}
.sc{position:absolute;width:22px;height:22px}
.sc::before,.sc::after{content:'';position:absolute;background:var(--accent)}
.sc.tl{top:0;left:0}.sc.tl::before{top:0;left:0;width:100%;height:3px}.sc.tl::after{top:0;left:0;width:3px;height:100%}
.sc.tr{top:0;right:0}.sc.tr::before{top:0;right:0;width:100%;height:3px}.sc.tr::after{top:0;right:0;width:3px;height:100%}
.sc.bl{bottom:0;left:0}.sc.bl::before{bottom:0;left:0;width:100%;height:3px}.sc.bl::after{bottom:0;left:0;width:3px;height:100%}
.sc.br{bottom:0;right:0}.sc.br::before{bottom:0;right:0;width:100%;height:3px}.sc.br::after{bottom:0;right:0;width:3px;height:100%}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
.remote-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:16px}
.remote-flash.flash{animation:photoFlash .4s ease}
@keyframes photoFlash{0%{opacity:0}20%{opacity:.85}100%{opacity:0}}

.p-btns{margin:.75rem 1rem 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.p-btn{padding:12px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px}
.p-btn:hover{background:var(--bg3)}
.p-btn.primary{background:var(--accent);color:#0d0d0d;border-color:transparent;font-weight:700}
.p-btn.primary:hover{background:var(--accent2)}
.p-btn.full{grid-column:1/-1}
.p-status-wrap{margin:.75rem 1rem .5rem}
.p-status{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:10px;font-size:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);transition:all .2s}
.p-status.connected{background:rgba(82,255,170,.07);border-color:rgba(82,255,170,.2);color:var(--green)}
.p-status.waiting{background:rgba(82,170,255,.07);border-color:rgba(82,170,255,.2);color:var(--blue)}
.p-status.error{background:rgba(255,82,82,.07);border-color:rgba(255,82,82,.2);color:var(--red)}
.p-status .s-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.p-status.connected .s-dot{animation:pulse 1.5s infinite}
.p-status.waiting .s-dot{animation:blink .8s infinite}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;padding:10px 20px;border-radius:24px;border:1px solid var(--border2);opacity:0;transition:all .3s;white-space:nowrap;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- 電腦等待畫面（掃碼前） -->
<div id="desktop-wait" class="hidden">
  <div class="wait-logo">
    <div class="wait-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round">
        <rect x="5" y="2" width="14" height="20" rx="2"/>
        <line x1="9" y1="7" x2="15" y2="7"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
        <line x1="9" y1="15" x2="12" y2="15"/>
      </svg>
    </div>
    <div>
      <h1>發票掃描系統</h1>
      <p>手機掃描 QR Code 即可連線</p>
    </div>
  </div>

  <div class="qr-card">
    <p>用手機相機掃描下方 QR Code</p>
    <div id="qr-wrap"><p style="font-size:11px;color:#555">產生中...</p></div>
    <div class="code-box">
      <div class="code-label">備用連線代碼</div>
      <div class="code-val" id="code-display">——</div>
    </div>
  </div>

  <div class="wait-status">
    <div class="s-dot"></div>
    <span>等待手機連線...</span>
  </div>
</div>

<!-- 電腦主畫面（連線後） -->
<div id="desktop-main" class="hidden">

  <!-- 左側：最新照片 + 縮圖 -->
  <div class="left-panel">
    <div>
      <div class="panel-label">QR Code 與拍照結果</div>
    </div>
    <div class="latest-photo" id="latest-photo">
      <span class="no-photo">等待第一張照片...</span>
      <img id="latest-img" alt="最新發票">
    </div>
    <div class="thumb-strip" id="thumb-strip"></div>
  </div>

  <!-- 右上：已收到照片 -->
  <div class="right-top">
    <div class="panel-label">已收到照片</div>
    <div class="conn-bar waiting" id="d-conn-bar">
      <div class="s-dot"></div>
      <span id="d-conn-text">手機已連線</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text3)" id="photo-count-label">0 張</span>
    </div>
    <div class="photo-grid-small" id="photo-grid">
      <div class="empty-grid" id="empty-grid">尚未收到照片</div>
    </div>
  </div>

  <!-- 右下：AI 辨識 -->
  <div class="right-bottom">
    <div class="ai-header">
      <div class="panel-label" style="margin-bottom:0">AI 辨識結果</div>
      <button class="btn-ai-rerun" id="btn-rerun" onclick="runAI()" disabled>重新辨識</button>
    </div>
    <div id="ai-content"><div class="ai-placeholder">收到照片後自動辨識</div></div>
    <div class="ai-actions" id="ai-actions" style="display:none">
      <button class="btn-action" onclick="copyAI()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        複製文字
      </button>
      <button class="btn-action" onclick="exportCSV()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        存成 CSV
      </button>
    </div>
  </div>

  <!-- 底部：遠端拍照 -->
  <div class="bottom-bar">
    <button class="btn-remote" id="btn-remote" onclick="sendCapture()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/></svg>
      遠端拍照
    </button>
  </div>

</div>

<!-- 手機端 -->
<div id="phone-screen" class="hidden">
  <div class="p-topbar">
    <button class="btn-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="p-topbar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div style="flex:1">
      <div class="p-title">手機相機</div>
      <div class="p-sub" id="p-subtitle">開啟相機，自動連線至電腦</div>
    </div>
  </div>

  <div class="camera-wrap">
    <div class="p-placeholder" id="p-placeholder">
      <div class="p-ph-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <p>點擊「開啟相機」開始</p>
    </div>
    <video id="p-video" autoplay playsinline muted></video>
    <canvas id="p-canvas"></canvas>
    <div class="scan-overlay" id="scan-overlay">
      <div class="scan-frame">
        <div class="sc tl"></div><div class="sc tr"></div>
        <div class="sc bl"></div><div class="sc br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="remote-flash" id="remote-flash"></div>
  </div>

  <div class="p-btns">
    <button class="p-btn primary full" id="p-btn-cam" onclick="startPhoneCamera()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      開啟相機
    </button>
    <button class="p-btn" id="p-btn-manual" onclick="manualCapture()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      手動拍照
    </button>
    <button class="p-btn" onclick="document.getElementById('p-file').click()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上傳圖片
    </button>
    <input type="file" id="p-file" accept="image/*" style="display:none" onchange="handleUpload(event)">
  </div>

  <div class="p-status-wrap">
    <div class="p-status waiting" id="p-status">
      <div class="s-dot"></div>
      <span id="p-status-text">等待連線至電腦...</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let peer=null,conn=null,hubPeer=null,phoneStream=null;
let photos=[],lastB64=null,lastResult=null,myRole='',roomCode='';
const PCFG={host:'0.peerjs.com',port:443,secure:true,path:'/'};

const $ = id => document.getElementById(id);
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function randCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function hide(id){$(id).classList.add('hidden')}
function show(id){$(id).classList.remove('hidden')}

function goBack(){
  if(phoneStream){phoneStream.getTracks().forEach(t=>t.stop());phoneStream=null}
  if(peer){try{peer.destroy()}catch(e){} peer=null}
  if(hubPeer){try{hubPeer.destroy()}catch(e){} hubPeer=null}
  conn=null;photos=[];lastB64=null;lastResult=null;
  hide('phone-screen');hide('desktop-main');hide('desktop-wait');
  window.history.replaceState({},'',window.location.pathname);
  autoDetect();
}

function autoDetect(){
  const params=new URLSearchParams(window.location.search);
  const roomParam=params.get('room');
  if(roomParam){startPhone(roomParam.toUpperCase());return}
  const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&window.innerWidth<860);
  if(isMobile) startPhone(null);
  else startDesktop();
}

/* ══ 電腦端 ══ */
function startDesktop(){
  myRole='desktop';
  roomCode=randCode();
  $('code-display').textContent=roomCode;
  show('desktop-wait');
  loadPeer(()=>{
    peer=new Peer('inv-d-'+roomCode,PCFG);
    peer.on('open',()=>{generateQR();setupHub()});
    peer.on('connection',c=>{conn=c;onDesktopConnected()});
    peer.on('error',e=>{if(e.type==='unavailable-id'){peer.destroy();startDesktop()}});
  });
}

function setupHub(){
  hubPeer=new Peer('inv-hub',PCFG);
  hubPeer.on('connection',c=>{
    c.on('data',d=>{if(d.type==='find-desktop')c.send({type:'found',code:roomCode})});
  });
  hubPeer.on('error',()=>{});
}

function onDesktopConnected(){
  // 切換畫面：隱藏 QR，顯示主畫面
  hide('desktop-wait');
  show('desktop-main');

  $('d-conn-bar').className='conn-bar connected';
  $('d-conn-text').textContent='手機已連線';
  $('btn-remote').disabled=false;

  conn.on('data',d=>{
    if(d.type==='photo') receivePhoto(d.image);
    else if(d.type==='ready') showToast('手機相機已開啟，可以拍照');
    else if(d.type==='hello') showToast('手機已加入');
  });
  conn.on('close',()=>{
    $('d-conn-bar').className='conn-bar waiting';
    $('d-conn-text').textContent='手機已中斷';
    $('btn-remote').disabled=true;
    conn=null;
  });
}

function sendCapture(){
  if(!conn||!conn.open){showToast('手機尚未連線');return}
  conn.send({type:'capture'});
  const b=$('btn-remote');
  b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),350);
}

function receivePhoto(b64){
  lastB64=b64;photos.unshift(b64);
  $('photo-count-label').textContent=photos.length+' 張';
  $('empty-grid').style.display='none';

  // 大圖預覽
  const li=$('latest-img');
  li.src=b64;li.style.display='block';
  $('latest-photo').querySelector('.no-photo') && ($('latest-photo').querySelector('.no-photo').style.display='none');

  // 左側縮圖
  addThumbStrip(b64,photos.length);
  // 右上縮圖
  addGridThumb(b64,photos.length);

  showToast('收到照片，辨識中...');
  $('btn-rerun').disabled=false;
  runAI();
}

function addThumbStrip(b64,idx){
  // 移除 active
  document.querySelectorAll('.thumb-item').forEach(t=>t.classList.remove('active'));
  const t=document.createElement('div');t.className='thumb-item active';
  const i=document.createElement('img');i.src=b64;i.alt='';
  t.appendChild(i);
  t.onclick=()=>{
    document.querySelectorAll('.thumb-item').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('latest-img').src=b64;$('latest-img').style.display='block';
    lastB64=b64;runAI();
  };
  $('thumb-strip').insertBefore(t,$('thumb-strip').firstChild);
}

function addGridThumb(b64,idx){
  const wrap=document.createElement('div');wrap.className='pg-thumb';
  const img=document.createElement('img');img.src=b64;img.alt='';
  const dl=document.createElement('button');dl.className='dl';dl.textContent='↓';
  dl.onclick=e=>{e.stopPropagation();dlPhoto(b64,idx)};
  wrap.appendChild(img);wrap.appendChild(dl);
  wrap.onclick=()=>{
    $('latest-img').src=b64;$('latest-img').style.display='block';
    lastB64=b64;runAI();
  };
  $('photo-grid').insertBefore(wrap,$('photo-grid').firstChild);
}

function dlPhoto(b64,idx){
  const a=document.createElement('a');a.href=b64;
  const n=new Date();
  a.download=`發票_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${idx}.jpg`;
  a.click();
}

function generateQR(){
  const c=$('qr-wrap');c.innerHTML='';
  const url=window.location.href.split('?')[0]+'?room='+roomCode;
  try{new QRCode(c,{text:url,width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M})}
  catch(e){c.innerHTML='<p style="font-size:11px;color:#555;text-align:center">QR 產生失敗<br>請輸入代碼</p>'}
}

/* ══ AI 辨識 ══ */
async function runAI(){
  if(!lastB64)return;
  $('ai-content').innerHTML='<div class="ai-loading"><span class="spinner"></span>辨識中...</div>';
  $('ai-actions').style.display='none';
  $('btn-rerun').disabled=true;
  try{
    const imgData=lastB64.replace(/^data:image\/\w+;base64,/,'');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},
        {type:'text',text:'請辨識這張發票圖片，只回傳 JSON 不含 markdown：{"invoice_number":"發票號碼","date":"日期YYYY/MM/DD","total":"含稅總金額數字","seller":"賣方名稱","seller_tax_id":"賣方統編","buyer":"買方名稱或無","buyer_tax_id":"買方統編或無","items":"品項摘要20字內"}'}
      ]}]})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'失敗');
    lastResult=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    renderAI(lastResult);
  }catch(e){
    $('ai-content').innerHTML=`<div class="ai-placeholder" style="color:var(--red)">辨識失敗：${e.message}</div>`;
  }
  $('btn-rerun').disabled=false;
}

function renderAI(r){
  const m=v=>v&&v!=='—'&&v!=='無'?'NT$ '+Number(v).toLocaleString():'—';
  $('ai-content').innerHTML=`
    <div class="ai-fields">
      <div class="ai-field full"><div class="af-label">發票號碼</div><div class="af-val">${r.invoice_number||'—'}</div></div>
      <div class="ai-field"><div class="af-label">日期</div><div class="af-val">${r.date||'—'}</div></div>
      <div class="ai-field"><div class="af-label">含稅總金額</div><div class="af-val total">${m(r.total)}</div></div>
      <div class="ai-field"><div class="af-label">賣方名稱</div><div class="af-val">${r.seller||'—'}</div></div>
      <div class="ai-field"><div class="af-label">賣方統編</div><div class="af-val">${r.seller_tax_id||'—'}</div></div>
      <div class="ai-field"><div class="af-label">買方名稱</div><div class="af-val">${r.buyer||'—'}</div></div>
      <div class="ai-field"><div class="af-label">買方統編</div><div class="af-val">${r.buyer_tax_id||'—'}</div></div>
      <div class="ai-field full"><div class="af-label">品項</div><div class="af-val">${r.items||'—'}</div></div>
    </div>`;
  $('ai-actions').style.display='grid';
  showToast('辨識完成！');
}

function copyAI(){
  if(!lastResult)return;
  const lb={invoice_number:'發票號碼',date:'日期',total:'含稅總金額',seller:'賣方名稱',seller_tax_id:'賣方統編',buyer:'買方名稱',buyer_tax_id:'買方統編',items:'品項'};
  const lines=Object.entries(lb).map(([k,l])=>`${l}：${lastResult[k]||'—'}`).join('\n');
  navigator.clipboard?navigator.clipboard.writeText(lines).then(()=>showToast('已複製')):(()=>{const t=document.createElement('textarea');t.value=lines;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('已複製')})();
}

function exportCSV(){
  if(!lastResult)return;
  const h=['發票號碼','日期','含稅總金額','賣方名稱','賣方統編','買方名稱','買方統編','品項'];
  const k=['invoice_number','date','total','seller','seller_tax_id','buyer','buyer_tax_id','items'];
  const csv='\uFEFF'+h.join(',')+'\n'+k.map(key=>'"'+(lastResult[key]||'').replace(/"/g,'""')+'"').join(',');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  const n=new Date();a.download=`發票_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}.csv`;
  a.click();showToast('CSV 已下載');
}

/* ══ 手機端 ══ */
function startPhone(code){
  myRole='phone';
  show('phone-screen');
  loadPeer(()=>{
    peer=new Peer('inv-p-'+Date.now(),PCFG);
    peer.on('open',()=>{
      if(code){roomCode=code;connectToDesktop()}
      else tryFindDesktop();
    });
    peer.on('connection',c=>{conn=c;setupPhoneConn()});
    peer.on('error',e=>setPSt('error','錯誤：'+(e.type||e.message)));
  });
}

function tryFindDesktop(){
  setPSt('waiting','自動搜尋電腦中...');
  if(!peer)return;
  const hc=peer.connect('inv-hub',PCFG);
  hc.on('open',()=>hc.send({type:'find-desktop'}));
  hc.on('data',d=>{if(d.type==='found'){roomCode=d.code;connectToDesktop()}});
  hc.on('error',()=>setTimeout(tryFindDesktop,3000));
}

function connectToDesktop(){
  setPSt('waiting','連線至電腦中...');
  conn=peer.connect('inv-d-'+roomCode,{reliable:true});
  conn.on('open',()=>{
    setPSt('connected','已連線至電腦！');
    $('p-subtitle').textContent='已連線，等待電腦指令';
    conn.send({type:'hello'});
    if(phoneStream)conn.send({type:'ready'});
  });
  conn.on('data',d=>{if(d.type==='capture')phoneTakePhoto()});
  conn.on('close',()=>{setPSt('waiting','連線中斷');conn=null});
  conn.on('error',()=>{setPSt('error','連線失敗');conn=null});
}

function setupPhoneConn(){
  setPSt('connected','已連線至電腦！');
  conn.on('data',d=>{if(d.type==='capture')phoneTakePhoto()});
  conn.on('close',()=>{setPSt('waiting','連線中斷');conn=null});
}

function setPSt(type,msg){
  $('p-status').className='p-status '+type;
  $('p-status-text').textContent=msg;
}

async function startPhoneCamera(){
  try{
    phoneStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
    const v=$('p-video');v.srcObject=phoneStream;v.style.display='block';
    $('p-placeholder').style.display='none';
    $('scan-overlay').classList.add('on');
    $('p-btn-cam').disabled=true;
    $('p-btn-manual').disabled=false;
    if(conn&&conn.open)conn.send({type:'ready'});
  }catch(e){showToast('無法開啟相機：'+e.message)}
}

function phoneTakePhoto(){
  const v=$('p-video');
  if(!v.srcObject){showToast('請先開啟相機');return}
  const c=$('p-canvas');
  c.width=v.videoWidth||1280;c.height=v.videoHeight||960;
  c.getContext('2d').drawImage(v,0,0);
  const b64=c.toDataURL('image/jpeg',0.88);
  const fl=$('remote-flash');fl.classList.add('flash');setTimeout(()=>fl.classList.remove('flash'),400);
  showToast('拍照完成，傳送中...');
  if(conn&&conn.open)conn.send({type:'photo',image:b64});
}
function manualCapture(){phoneTakePhoto()}
function handleUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    if(conn&&conn.open){conn.send({type:'photo',image:ev.target.result});showToast('圖片已傳送')}
    else showToast('尚未連線至電腦');
  };
  r.readAsDataURL(f);e.target.value='';
}

function loadPeer(cb){
  if(window.Peer){cb();return}
  const s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  s.onload=cb;
  s.onerror=()=>{const s2=document.createElement('script');s2.src='https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js';s2.onload=cb;document.head.appendChild(s2)};
  document.head.appendChild(s);
}

window.addEventListener('load',autoDetect);
</script>
</body>
</html>
