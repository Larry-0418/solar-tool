<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>發票掃描系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#efefef;--text2:#909090;--text3:#505050;
  --accent:#e9ff52;--accent2:#c2d93a;
  --green:#52ffaa;--red:#ff5252;--blue:#52aaff;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.hidden{display:none!important}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
button:active{transform:scale(.97)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flashBtn{0%{background:var(--accent)}50%{background:#fff}100%{background:var(--accent)}}
@keyframes photoFlash{0%{opacity:0}20%{opacity:.85}100%{opacity:0}}
@keyframes scanMove{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}

/* ══ QR 等待畫面 ══ */
#wait-screen{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;padding:2rem;
}
.wait-logo{display:flex;align-items:center;gap:12px}
.wait-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center}
.wait-logo-icon svg{width:24px;height:24px}
.wait-logo h1{font-size:22px;font-weight:700}
.wait-logo p{font-size:12px;color:var(--text2);margin-top:2px}
.qr-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:1.75rem;display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:300px}
.qr-card p{font-size:13px;color:var(--text2);text-align:center}
#qr-wrap{background:#fff;border-radius:12px;padding:10px;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
#qr-wrap canvas,#qr-wrap img{width:100%!important;height:100%!important}
.wait-status{display:flex;align-items:center;gap:8px;font-size:13px;padding:10px 20px;border-radius:24px;background:rgba(82,170,255,.08);border:1px solid rgba(82,170,255,.2);color:var(--blue)}
.s-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink .8s infinite;flex-shrink:0}

/* ══ 電腦主畫面 ══ */
#desktop-screen{
  height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr auto;
}

/* 左側：佔滿全部左欄 + 底部按鈕列 */
.left-col{
  grid-column:1/2;
  grid-row:1/3;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:1rem;gap:.75rem;overflow:hidden;
}
.left-bottom{
  grid-column:1/2;
  grid-row:3/4;
  border-right:1px solid var(--border);
  border-top:1px solid var(--border);
  padding:.75rem 1rem;
}

/* 右上：已收到照片 */
.right-top{
  grid-column:2/3;
  grid-row:1/2;
  border-bottom:1px solid var(--border);
  padding:1rem;display:flex;flex-direction:column;gap:.6rem;overflow:hidden;
}

/* 右下：AI 辨識 */
.right-bottom{
  grid-column:2/3;
  grid-row:2/4;
  padding:1rem;display:flex;flex-direction:column;gap:.6rem;overflow-y:auto;
}
.right-bottom::-webkit-scrollbar{width:3px}
.right-bottom::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.sec-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}

/* 左側串流區 */
.live-box{
  flex:1;background:#000;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);position:relative;
  display:flex;align-items:center;justify-content:center;min-height:0;
}
.live-box img{width:100%;height:100%;object-fit:contain;display:none}
.live-box .no-img{font-size:12px;color:var(--text3);text-align:center}
.live-badge{position:absolute;top:8px;left:8px;background:rgba(255,82,82,.9);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:none}
.live-badge.on{display:block;animation:blink 1.5s infinite}
.snap-badge{position:absolute;top:8px;left:8px;background:rgba(233,255,82,.9);color:#0d0d0d;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:none}
.snap-badge.on{display:block}

/* 縮圖列 */
.thumb-row{display:flex;gap:6px;overflow-x:auto;flex-shrink:0;padding-bottom:2px}
.thumb-row::-webkit-scrollbar{height:3px}
.thumb-row::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.t-item{width:48px;height:64px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.t-item:hover,.t-item.active{border-color:var(--accent)}
.t-item img{width:100%;height:100%;object-fit:cover}

/* 連線狀態 */
.conn-bar{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:9px;font-size:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);transition:all .2s;flex-shrink:0}
.conn-bar.connected{background:rgba(82,255,170,.07);border-color:rgba(82,255,170,.2);color:var(--green)}
.conn-bar.waiting{background:rgba(82,170,255,.07);border-color:rgba(82,170,255,.2);color:var(--blue)}
.conn-bar.connected .s-dot{animation:pulse 1.5s infinite}
.conn-bar.waiting .s-dot{animation:blink .8s infinite}

/* 右上照片格 */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:5px;overflow-y:auto;flex:1;min-height:0}
.photo-grid::-webkit-scrollbar{width:3px}
.photo-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.pg-item{aspect-ratio:3/4;border-radius:7px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.pg-item:hover{border-color:var(--border2);transform:scale(1.03)}
.pg-item img{width:100%;height:100%;object-fit:cover}
.pg-item .dl{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:9px;border-radius:4px;padding:2px 4px;cursor:pointer;display:none}
.pg-item:hover .dl{display:block}
.empty-note{text-align:center;padding:1.5rem;color:var(--text3);font-size:12px;grid-column:1/-1}

/* 遠端拍照按鈕 */
.btn-remote{width:100%;padding:11px;border-radius:11px;background:var(--accent);color:#0d0d0d;font-size:14px;font-weight:700;border:none;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-remote:hover{background:var(--accent2)}
.btn-remote.flash{animation:flashBtn .3s ease}

/* AI 結果 */
.ai-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.btn-rerun{padding:5px 12px;border-radius:7px;background:var(--accent);color:#0d0d0d;font-weight:700;border:none;font-size:11px}
.btn-rerun:hover{background:var(--accent2)}
.ai-fields{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ai-field{background:var(--bg3);border-radius:9px;padding:9px 11px}
.ai-field.full{grid-column:1/-1}
.af-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.af-val{font-size:13px;color:var(--text);font-weight:500;word-break:break-all}
.af-val.total{color:var(--accent);font-size:18px;font-family:'JetBrains Mono',monospace}
.ai-note{text-align:center;padding:1.5rem;color:var(--text3);font-size:12px}
.ai-loading{text-align:center;padding:1.5rem;color:var(--text2);font-size:12px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
.ai-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex-shrink:0}
.btn-act{padding:8px;border-radius:9px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-act:hover{background:var(--bg3)}

/* ══ 手機端 ══ */
#phone-screen{min-height:100vh;display:flex;flex-direction:column;max-width:480px;width:100%;margin:0 auto}
.p-topbar{display:flex;align-items:center;gap:10px;padding:.9rem 1.25rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.btn-back{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;padding:0}
.btn-back svg{width:16px;height:16px;stroke:var(--text)}
.p-topbar-icon{width:34px;height:34px;border-radius:9px;background:rgba(82,255,170,.15);display:flex;align-items:center;justify-content:center}
.p-title{font-size:16px;font-weight:700}
.p-sub{font-size:11px;color:var(--text2);margin-top:1px}
.cam-wrap{margin:.75rem 1rem 0;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:3/4;position:relative;border:1px solid var(--border)}
#p-video{width:100%;height:100%;object-fit:cover;display:none}
#p-canvas{display:none}
.p-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.p-ph-icon{width:56px;height:56px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.p-ph-icon svg{width:26px;height:26px;color:var(--text3)}
.p-ph p{font-size:13px;color:var(--text3)}
.scan-ov{position:absolute;inset:0;pointer-events:none;display:none}
.scan-ov.on{display:block}
.scan-fr{position:absolute;top:10%;left:7%;right:7%;bottom:10%}
.sc{position:absolute;width:22px;height:22px}
.sc::before,.sc::after{content:'';position:absolute;background:var(--accent)}
.sc.tl{top:0;left:0}.sc.tl::before{top:0;left:0;width:100%;height:3px}.sc.tl::after{top:0;left:0;width:3px;height:100%}
.sc.tr{top:0;right:0}.sc.tr::before{top:0;right:0;width:100%;height:3px}.sc.tr::after{top:0;right:0;width:3px;height:100%}
.sc.bl{bottom:0;left:0}.sc.bl::before{bottom:0;left:0;width:100%;height:3px}.sc.bl::after{bottom:0;left:0;width:3px;height:100%}
.sc.br{bottom:0;right:0}.sc.br::before{bottom:0;right:0;width:100%;height:3px}.sc.br::after{bottom:0;right:0;width:3px;height:100%}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);animation:scanMove 2s ease-in-out infinite}
.r-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:16px}
.r-flash.flash{animation:photoFlash .4s ease}
.p-btns{margin:.75rem 1rem 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.p-btn{padding:12px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px}
.p-btn:hover{background:var(--bg3)}
.p-btn.pri{background:var(--accent);color:#0d0d0d;border-color:transparent;font-weight:700}
.p-btn.pri:hover{background:var(--accent2)}
.p-st-wrap{margin:.75rem 1rem 0}
.p-st{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px;font-size:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);transition:all .2s}
.p-st.connected{background:rgba(82,255,170,.07);border-color:rgba(82,255,170,.2);color:var(--green)}
.p-st.waiting{background:rgba(82,170,255,.07);border-color:rgba(82,170,255,.2);color:var(--blue)}
.p-st.error{background:rgba(255,82,82,.07);border-color:rgba(255,82,82,.2);color:var(--red)}
.p-st .s-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.p-st.connected .s-dot{animation:pulse 1.5s infinite}
.p-st.waiting .s-dot{animation:blink .8s infinite}
.p-ai{margin:.75rem 1rem 1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem;display:none}
.p-ai.show{display:block}
.p-ai-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* 上傳框 */
.upload-box{
  flex-shrink:0;border:1.5px dashed var(--border2);border-radius:10px;
  padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:all .2s;color:var(--text2);font-size:12px;
}
.upload-box:hover{border-color:var(--accent);color:var(--accent);background:rgba(233,255,82,.04)}

/* 照片項目 */
.pg-item-wrap{display:flex;flex-direction:column;gap:3px}
.pg-dl-btn{
  width:100%;padding:3px 0;border-radius:5px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:3px;
}
.pg-dl-btn:hover{background:var(--accent);color:#0d0d0d;border-color:transparent}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;padding:10px 20px;border-radius:24px;border:1px solid var(--border2);opacity:0;transition:all .3s;white-space:nowrap;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- QR 等待畫面 -->
<div id="wait-screen" class="hidden">
  <div class="wait-logo">
    <div class="wait-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round">
        <rect x="5" y="2" width="14" height="20" rx="2"/>
        <line x1="9" y1="7" x2="15" y2="7"/>
        <line x1="9" y1="11" x2="15" y2="11"/>
        <line x1="9" y1="15" x2="12" y2="15"/>
      </svg>
    </div>
    <div><h1>發票掃描系統</h1><p>手機掃描 QR Code 即可連線</p></div>
  </div>
  <div class="qr-card">
    <p>用手機掃描 QR Code 開啟相機</p>
    <div id="qr-wrap"><p style="font-size:11px;color:#555">產生中...</p></div>
  </div>
  <div class="wait-status">
    <div class="s-dot"></div>
    <span>等待手機連線...</span>
  </div>
</div>

<!-- 電腦主畫面 -->
<div id="desktop-screen" class="hidden">

  <!-- 左側：串流畫面 + 縮圖 + 拍照按鈕 -->
  <div class="left-col">
    <div class="sec-label">手機畫面</div>
    <div class="live-box" id="live-box">
      <span class="no-img" id="no-img-txt">等待手機串流...</span>
      <img id="live-img" alt="">
      <div class="live-badge" id="live-badge">● LIVE</div>
      <div class="snap-badge" id="snap-badge">📷 最新照片</div>
    </div>
    <div class="thumb-row" id="thumb-row"></div>
  </div>
  <div class="left-bottom">
    <button class="btn-remote" id="btn-remote" onclick="sendCapture()" disabled>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/></svg>
      遠端拍照
    </button>
  </div>

  <!-- 右上：已收到照片 -->
  <div class="right-top">
    <div class="sec-label">已收到照片</div>
    <div class="conn-bar waiting" id="d-conn">
      <div class="s-dot"></div>
      <span id="d-conn-txt">等待手機連線</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text3)" id="photo-cnt">0 張</span>
    </div>
    <div class="photo-grid" id="photo-grid">
      <div class="empty-note" id="empty-note">尚未收到照片</div>
    </div>

    <!-- 上傳照片辨識 -->
    <div class="upload-box" id="upload-box" onclick="document.getElementById('d-upload').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>上傳照片辨識</span>
      <span style="font-size:10px;color:var(--text3)">點擊或拖曳圖片</span>
    </div>
    <input type="file" id="d-upload" accept="image/*" style="display:none" onchange="handleDesktopUpload(event)">
  </div>

  <!-- 右下：AI 辨識結果 -->
  <div class="right-bottom">
    <div class="ai-header">
      <div class="sec-label">AI 辨識結果</div>
      <button class="btn-rerun" id="btn-rerun" onclick="runAI()" disabled>重新辨識</button>
    </div>
    <div id="ai-content"><div class="ai-note">收到照片後自動辨識</div></div>
    <div class="ai-actions" id="ai-actions" style="display:none">
      <button class="btn-act" onclick="copyAI()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製
      </button>
      <button class="btn-act" onclick="exportCSV()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>CSV
      </button>
    </div>
  </div>

</div>

<!-- 手機端 -->
<div id="phone-screen" class="hidden">
  <div class="p-topbar">
    <button class="btn-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="p-topbar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div style="flex:1">
      <div class="p-title">發票相機</div>
      <div class="p-sub" id="p-sub">開啟相機中...</div>
    </div>
  </div>

  <div class="cam-wrap">
    <div class="p-ph" id="p-ph">
      <div class="p-ph-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <p id="p-ph-txt">啟動相機中...</p>
    </div>
    <video id="p-video" autoplay playsinline muted></video>
    <canvas id="p-canvas"></canvas>
    <div class="scan-ov" id="scan-ov">
      <div class="scan-fr">
        <div class="sc tl"></div><div class="sc tr"></div>
        <div class="sc bl"></div><div class="sc br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="r-flash" id="r-flash"></div>
  </div>

  <div class="p-btns">
    <button class="p-btn pri" id="p-btn-shoot" onclick="phoneTakePhoto()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      拍照
    </button>
    <button class="p-btn" onclick="document.getElementById('p-file').click()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上傳圖片
    </button>
    <input type="file" id="p-file" accept="image/*" style="display:none" onchange="handleUpload(event)">
  </div>

  <div class="p-st-wrap">
    <div class="p-st waiting" id="p-st">
      <div class="s-dot"></div>
      <span id="p-st-txt">連線電腦中...</span>
    </div>
  </div>

  <div class="p-ai" id="p-ai">
    <div class="p-ai-label">辨識結果</div>
    <div id="p-ai-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let peer=null,conn=null,hubPeer=null,phoneStream=null;
let photos=[],lastB64=null,lastResult=null,myRole='',roomCode='';
let streamTimer=null;
const PCFG={host:'0.peerjs.com',port:443,secure:true,path:'/'};

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function randCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function show(id){$(id).classList.remove('hidden')}
function hide(id){$(id).classList.add('hidden')}

function goBack(){
  if(phoneStream){phoneStream.getTracks().forEach(t=>t.stop());phoneStream=null}
  if(streamTimer){clearInterval(streamTimer);streamTimer=null}
  if(peer){try{peer.destroy()}catch(e){}}
  if(hubPeer){try{hubPeer.destroy()}catch(e){}}
  peer=conn=hubPeer=null;photos=[];lastB64=lastResult=null;
  hide('phone-screen');hide('desktop-screen');hide('wait-screen');
  window.history.replaceState({},'',window.location.pathname);
  autoDetect();
}

function autoDetect(){
  const p=new URLSearchParams(window.location.search);
  const r=p.get('room');
  if(r){startPhone(r.toUpperCase());return}
  const mob=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&window.innerWidth<860);
  mob?startPhone(null):startDesktop();
}

/* ══ 電腦端 ══ */
function startDesktop(){
  myRole='desktop';
  roomCode=randCode();
  show('wait-screen');
  loadPeer(()=>{
    peer=new Peer('inv-d-'+roomCode,PCFG);
    peer.on('open',()=>{genQR();setupHub()});
    peer.on('connection',c=>{conn=c;onConnected()});
    peer.on('error',e=>{if(e.type==='unavailable-id'){peer.destroy();startDesktop()}});
  });
}

function setupHub(){
  hubPeer=new Peer('inv-hub',PCFG);
  hubPeer.on('connection',c=>{c.on('data',d=>{if(d.type==='find')c.send({type:'code',code:roomCode})})});
  hubPeer.on('error',()=>{});
}

function onConnected(){
  hide('wait-screen');show('desktop-screen');
  $('d-conn').className='conn-bar connected';
  $('d-conn-txt').textContent='手機已連線';
  $('btn-remote').disabled=false;
  conn.on('data',d=>{
    if(d.type==='photo') gotPhoto(d.image);
    else if(d.type==='stream') gotStream(d.image);
    else if(d.type==='ai') {lastResult=d.r;renderAI(d.r);}
    else if(d.type==='ready') toast('手機相機已開啟');
  });
  conn.on('close',()=>{
    $('d-conn').className='conn-bar waiting';
    $('d-conn-txt').textContent='手機已中斷';
    $('btn-remote').disabled=true;
    conn=null;
  });
}

function sendCapture(){
  if(!conn||!conn.open){toast('手機未連線');return}
  conn.send({type:'capture'});
  const b=$('btn-remote');b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),350);
}

function gotStream(b64){
  $('live-img').src=b64;$('live-img').style.display='block';
  $('no-img-txt').style.display='none';
  $('live-badge').classList.add('on');
  $('snap-badge').classList.remove('on');
}

function gotPhoto(b64){
  lastB64=b64;photos.unshift(b64);
  $('photo-cnt').textContent=photos.length+' 張';
  $('empty-note').style.display='none';
  $('live-img').src=b64;$('live-img').style.display='block';
  $('live-badge').classList.remove('on');
  $('snap-badge').classList.add('on');
  setTimeout(()=>$('snap-badge').classList.remove('on'),2000);
  addThumb(b64,photos.length);
  addGrid(b64,photos.length);
  $('btn-rerun').disabled=false;
}

function addThumb(b64,idx){
  document.querySelectorAll('.t-item').forEach(x=>x.classList.remove('active'));
  const t=document.createElement('div');t.className='t-item active';
  const i=document.createElement('img');i.src=b64;
  t.appendChild(i);
  t.onclick=()=>{
    document.querySelectorAll('.t-item').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('live-img').src=b64;lastB64=b64;runAI();
  };
  $('thumb-row').insertBefore(t,$('thumb-row').firstChild);
}

function addGrid(b64,idx){
  const wrap=document.createElement('div');wrap.className='pg-item-wrap';
  const item=document.createElement('div');item.className='pg-item';
  const img=document.createElement('img');img.src=b64;img.alt='';
  item.appendChild(img);
  item.onclick=()=>{$('live-img').src=b64;$('live-img').style.display='block';lastB64=b64;runAI()};
  const dlBtn=document.createElement('button');dlBtn.className='pg-dl-btn';
  dlBtn.innerHTML='↓ 下載';
  dlBtn.onclick=()=>dlPhoto(b64,idx);
  wrap.appendChild(item);wrap.appendChild(dlBtn);
  $('photo-grid').insertBefore(wrap,$('photo-grid').firstChild);
}

function handleDesktopUpload(e){
  const f=e.target.files[0];if(!f)return;
  loadImage(f);e.target.value='';
}

function handleDrop(e){
  e.preventDefault();
  $('upload-box').style.borderColor='';
  const f=e.dataTransfer.files[0];
  if(!f||!f.type.startsWith('image/'))return;
  loadImage(f);
}

function loadImage(f){
  const r=new FileReader();
  r.onload=ev=>{
    const b64=ev.target.result;
    lastB64=b64;photos.unshift(b64);
    $('live-img').src=b64;$('live-img').style.display='block';
    $('no-img-txt').style.display='none';
    $('snap-badge').classList.add('on');
    setTimeout(()=>$('snap-badge').classList.remove('on'),2000);
    $('photo-cnt').textContent=photos.length+' 張';
    $('empty-note').style.display='none';
    addThumb(b64,photos.length);
    addGrid(b64,photos.length);
    $('btn-rerun').disabled=false;
    toast('圖片已載入，辨識中...');
    runAI();
  };
  r.readAsDataURL(f);
}

function dlPhoto(b64,idx){
  const a=document.createElement('a');a.href=b64;
  const n=new Date();
  a.download=`發票_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${idx}.jpg`;
  a.click();
}

function genQR(){
  const c=$('qr-wrap');c.innerHTML='';
  const url=location.href.split('?')[0]+'?room='+roomCode;
  try{new QRCode(c,{text:url,width:180,height:180,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M})}
  catch(e){c.innerHTML='<p style="font-size:11px;color:#555;text-align:center">QR 失敗<br>代碼：'+roomCode+'</p>'}
}

/* ══ AI 辨識（電腦端） ══ */
async function runAI(){
  if(!lastB64)return;
  $('ai-content').innerHTML='<div class="ai-loading"><span class="spinner"></span>辨識中...</div>';
  $('ai-actions').style.display='none';
  $('btn-rerun').disabled=true;
  try{
    const imgData=lastB64.replace(/^data:image\/\w+;base64,/,'');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-ipc':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},
        {type:'text',text:'請辨識這張發票，只回傳 JSON 不含 markdown：{"invoice_number":"發票號碼","date":"日期YYYY/MM/DD","total":"含稅總金額只填數字","seller":"賣方名稱","seller_tax_id":"賣方統編","buyer":"買方名稱沒有填無","buyer_tax_id":"買方統編沒有填無","random_code":"隨機碼","items":"品項20字內"}'}
      ]}]})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'失敗');
    lastResult=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    renderAI(lastResult);
  }catch(e){
    $('ai-content').innerHTML=`<div class="ai-note" style="color:var(--red)">辨識失敗：${e.message}</div>`;
  }
  $('btn-rerun').disabled=false;
}

function renderAI(r){
  const m=v=>v&&v!=='無'&&v!=='—'?'NT$ '+Number(v).toLocaleString():'—';
  $('ai-content').innerHTML=`
    <div class="ai-fields">
      <div class="ai-field full"><div class="af-label">發票號碼</div><div class="af-val">${r.invoice_number||'—'}</div></div>
      <div class="ai-field"><div class="af-label">日期</div><div class="af-val">${r.date||'—'}</div></div>
      <div class="ai-field"><div class="af-label">隨機碼</div><div class="af-val">${r.random_code||'—'}</div></div>
      <div class="ai-field full"><div class="af-label">含稅總金額</div><div class="af-val total">${m(r.total)}</div></div>
      <div class="ai-field"><div class="af-label">賣方</div><div class="af-val">${r.seller||'—'}</div></div>
      <div class="ai-field"><div class="af-label">賣方統編</div><div class="af-val">${r.seller_tax_id||'—'}</div></div>
      ${r.buyer&&r.buyer!=='無'?`<div class="ai-field"><div class="af-label">買方</div><div class="af-val">${r.buyer}</div></div><div class="ai-field"><div class="af-label">買方統編</div><div class="af-val">${r.buyer_tax_id||'—'}</div></div>`:''}
      <div class="ai-field full"><div class="af-label">品項</div><div class="af-val">${r.items||'—'}</div></div>
    </div>`;
  $('ai-actions').style.display='grid';
  toast('辨識完成！');
}

function copyAI(){
  if(!lastResult)return;
  const lb={invoice_number:'發票號碼',date:'日期',total:'金額',seller:'賣方',seller_tax_id:'賣方統編',buyer:'買方',buyer_tax_id:'買方統編',random_code:'隨機碼',items:'品項'};
  const txt=Object.entries(lb).map(([k,l])=>`${l}：${lastResult[k]||'—'}`).join('\n');
  navigator.clipboard?navigator.clipboard.writeText(txt).then(()=>toast('已複製')):toast('複製失敗');
}

function exportCSV(){
  if(!lastResult)return;
  const h=['發票號碼','日期','含稅總金額','賣方','賣方統編','買方','買方統編','隨機碼','品項'];
  const k=['invoice_number','date','total','seller','seller_tax_id','buyer','buyer_tax_id','random_code','items'];
  const csv='\uFEFF'+h.join(',')+'\n'+k.map(key=>'"'+(lastResult[key]||'').replace(/"/g,'""')+'"').join(',');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  const n=new Date();a.download=`發票_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}.csv`;
  a.click();toast('CSV 已下載');
}

/* ══ 手機端 ══ */
function startPhone(code){
  myRole='phone';
  show('phone-screen');
  // 自動開相機
  startCam();
  // 連線電腦
  loadPeer(()=>{
    peer=new Peer('inv-p-'+Date.now(),PCFG);
    peer.on('open',()=>{ code?connectDesk(code):findDesk() });
    peer.on('connection',c=>{conn=c;setupPhone()});
    peer.on('error',e=>setPSt('error','錯誤：'+(e.type||e.message)));
  });
}

function findDesk(){
  setPSt('waiting','搜尋電腦中...');
  const hc=peer.connect('inv-hub',PCFG);
  hc.on('open',()=>hc.send({type:'find'}));
  hc.on('data',d=>{if(d.type==='code'){roomCode=d.code;connectDesk(d.code)}});
  hc.on('error',()=>setTimeout(findDesk,3000));
}

function connectDesk(code){
  roomCode=code;
  setPSt('waiting','連線中...');
  conn=peer.connect('inv-d-'+code,{reliable:true});
  conn.on('open',()=>{
    setPSt('connected','已連線至電腦');
    $('p-sub').textContent='已連線，對準發票按拍照';
    conn.send({type:'hello'});
    if(phoneStream){conn.send({type:'ready'});startStream()}
  });
  conn.on('data',d=>{if(d.type==='capture')phoneTakePhoto()});
  conn.on('close',()=>{setPSt('waiting','連線中斷');conn=null;if(streamTimer){clearInterval(streamTimer);streamTimer=null}});
  conn.on('error',()=>{setPSt('error','連線失敗');conn=null});
}

function setupPhone(){
  setPSt('connected','已連線至電腦');
  conn.on('data',d=>{if(d.type==='capture')phoneTakePhoto()});
  conn.on('close',()=>{setPSt('waiting','連線中斷');conn=null});
  if(phoneStream)startStream();
}

function setPSt(type,msg){
  $('p-st').className='p-st '+type;
  $('p-st-txt').textContent=msg;
}

async function startCam(){
  try{
    phoneStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
    const v=$('p-video');v.srcObject=phoneStream;v.style.display='block';
    $('p-ph').style.display='none';
    $('scan-ov').classList.add('on');
    $('p-btn-shoot').disabled=false;
    $('p-sub').textContent='對準發票後按拍照';
    if(conn&&conn.open){conn.send({type:'ready'});startStream()}
  }catch(e){
    $('p-ph-txt').textContent='無法開啟相機，請點此重試';
    $('p-ph').style.cursor='pointer';
    $('p-ph').onclick=startCam;
  }
}

function startStream(){
  if(streamTimer)clearInterval(streamTimer);
  streamTimer=setInterval(()=>{
    if(!conn||!conn.open||!phoneStream){clearInterval(streamTimer);streamTimer=null;return}
    const v=$('p-video');if(!v.videoWidth)return;
    const c=document.createElement('canvas');
    c.width=Math.round(v.videoWidth/2);c.height=Math.round(v.videoHeight/2);
    c.getContext('2d').drawImage(v,0,0,c.width,c.height);
    conn.send({type:'stream',image:c.toDataURL('image/jpeg',0.35)});
  },250);
}

function phoneTakePhoto(){
  const v=$('p-video');
  if(!v.srcObject){toast('請先開啟相機');return}
  const c=$('p-canvas');
  c.width=v.videoWidth||1280;c.height=v.videoHeight||960;
  c.getContext('2d').drawImage(v,0,0);
  const b64=c.toDataURL('image/jpeg',0.88);
  $('r-flash').classList.add('flash');
  setTimeout(()=>$('r-flash').classList.remove('flash'),400);
  // 傳給電腦
  if(conn&&conn.open)conn.send({type:'photo',image:b64});
  // 手機直接辨識
  runPhoneAI(b64);
}

async function runPhoneAI(b64){
  const box=$('p-ai');const content=$('p-ai-content');
  box.classList.add('show');
  content.innerHTML='<div style="text-align:center;padding:.75rem;color:var(--text2);font-size:13px"><span class="spinner"></span>辨識中...</div>';
  try{
    const imgData=b64.replace(/^data:image\/\w+;base64,/,'');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-ipc':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},
        {type:'text',text:'請辨識這張發票，只回傳 JSON 不含 markdown：{"invoice_number":"發票號碼","date":"日期YYYY/MM/DD","total":"含稅總金額只填數字","seller":"賣方名稱","seller_tax_id":"賣方統編","buyer":"買方名稱沒有填無","buyer_tax_id":"買方統編沒有填無","random_code":"隨機碼","items":"品項20字內"}'}
      ]}]})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'失敗');
    const r=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    const m=v=>v&&v!=='無'?'NT$ '+Number(v).toLocaleString():'—';
    content.innerHTML=`
      <div style="display:flex;flex-direction:column;gap:5px">
        <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
          <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">發票號碼</div>
          <div style="font-size:15px;font-weight:700;color:var(--accent)">${r.invoice_number||'—'}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
          <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">日期</div>
            <div style="font-size:12px;font-weight:500;color:var(--text)">${r.date||'—'}</div>
          </div>
          <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">隨機碼</div>
            <div style="font-size:12px;font-weight:500;color:var(--text)">${r.random_code||'—'}</div>
          </div>
        </div>
        <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
          <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">含稅總金額</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace">${m(r.total)}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
          <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">賣方</div>
            <div style="font-size:11px;font-weight:500;color:var(--text)">${r.seller||'—'}</div>
          </div>
          <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">賣方統編</div>
            <div style="font-size:11px;font-weight:500;color:var(--text)">${r.seller_tax_id||'—'}</div>
          </div>
        </div>
        ${r.buyer&&r.buyer!=='無'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
          <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">買方</div>
            <div style="font-size:11px;font-weight:500;color:var(--text)">${r.buyer}</div>
          </div>
          <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">買方統編</div>
            <div style="font-size:11px;font-weight:500;color:var(--text)">${r.buyer_tax_id||'—'}</div>
          </div>
        </div>`:''}
        <div style="background:var(--bg3);border-radius:9px;padding:8px 11px">
          <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">品項</div>
          <div style="font-size:11px;color:var(--text2)">${r.items||'—'}</div>
        </div>
      </div>`;
    toast('辨識完成！');
    if(conn&&conn.open)conn.send({type:'ai',r});
  }catch(e){
    content.innerHTML=`<div style="text-align:center;padding:.75rem;color:var(--red);font-size:12px">辨識失敗：${e.message}</div>`;
  }
}

function handleUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const b64=ev.target.result;
    if(conn&&conn.open)conn.send({type:'photo',image:b64});
    runPhoneAI(b64);
  };
  r.readAsDataURL(f);e.target.value='';
}

function loadPeer(cb){
  if(window.Peer){cb();return}
  const s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  s.onload=cb;
  s.onerror=()=>{const s2=document.createElement('script');s2.src='https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js';s2.onload=cb;document.head.appendChild(s2)};
  document.head.appendChild(s);
}

window.addEventListener('load',autoDetect);
</script>
