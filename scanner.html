<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">
<title>發票掃描系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#efefef;--text2:#909090;--text3:#505050;
  --accent:#e9ff52;--accent2:#c2d93a;
  --green:#52ffaa;--red:#ff5252;--blue:#52aaff;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{min-height:100vh;display:flex;flex-direction:column}
.hidden{display:none!important}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
button:active{transform:scale(.96)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* ── 頂部導覽 ── */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:.9rem 1.25rem;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;flex-shrink:0;
}
.btn-back{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);
  background:var(--bg2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;padding:0;
}
.btn-back:hover{background:var(--bg3)}
.btn-back svg{width:16px;height:16px;stroke:var(--text)}
.topbar-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-icon.phone{background:rgba(82,255,170,.15)}
.topbar-icon.desktop{background:rgba(233,255,82,.15)}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* ── 狀態列 ── */
.status-bar{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:11px;font-size:13px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);transition:all .2s}
.status-bar.connected{background:rgba(82,255,170,.07);border-color:rgba(82,255,170,.2);color:var(--green)}
.status-bar.waiting{background:rgba(82,170,255,.07);border-color:rgba(82,170,255,.2);color:var(--blue)}
.status-bar.active{background:rgba(82,170,255,.07);border-color:rgba(82,170,255,.2);color:var(--blue)}
.status-bar.error{background:rgba(255,82,82,.07);border-color:rgba(255,82,82,.2);color:var(--red)}
.s-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.status-bar.connected .s-dot{animation:pulse 1.5s infinite}
.status-bar.waiting .s-dot,.status-bar.active .s-dot{animation:blink .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ══ 手機端 ══ */
#phone-screen{flex:1;display:flex;flex-direction:column;max-width:480px;width:100%;margin:0 auto}
.camera-wrap{margin:.75rem 1rem 0;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:3/4;position:relative;border:1px solid var(--border)}
#p-video{width:100%;height:100%;object-fit:cover;display:none}
#p-canvas{display:none}
.p-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.p-ph-icon{width:60px;height:60px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.p-ph-icon svg{width:28px;height:28px;color:var(--text3)}
.p-placeholder p{font-size:13px;color:var(--text3)}
.scan-overlay{position:absolute;inset:0;pointer-events:none;display:none}
.scan-overlay.on{display:block}
.scan-frame{position:absolute;top:10%;left:7%;right:7%;bottom:10%}
.sc{position:absolute;width:22px;height:22px}
.sc::before,.sc::after{content:'';position:absolute;background:var(--accent)}
.sc.tl{top:0;left:0}.sc.tl::before{top:0;left:0;width:100%;height:3px;border-radius:3px 0 0 0}.sc.tl::after{top:0;left:0;width:3px;height:100%}
.sc.tr{top:0;right:0}.sc.tr::before{top:0;right:0;width:100%;height:3px;border-radius:0 3px 0 0}.sc.tr::after{top:0;right:0;width:3px;height:100%}
.sc.bl{bottom:0;left:0}.sc.bl::before{bottom:0;left:0;width:100%;height:3px}.sc.bl::after{bottom:0;left:0;width:3px;height:100%}
.sc.br{bottom:0;right:0}.sc.br::before{bottom:0;right:0;width:100%;height:3px}.sc.br::after{bottom:0;right:0;width:3px;height:100%}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
.remote-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:16px}
.remote-flash.flash{animation:photoFlash .4s ease}
@keyframes photoFlash{0%{opacity:0}20%{opacity:.85}100%{opacity:0}}

.p-btns{margin:.75rem 1rem 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.p-btn{padding:12px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px}
.p-btn:hover{background:var(--bg3)}
.p-btn.primary{background:var(--accent);color:#0d0d0d;border-color:transparent;font-weight:700}
.p-btn.primary:hover{background:var(--accent2)}
.p-btn.full{grid-column:1/-1}
.p-section{margin:.75rem 1rem 0}

/* ══ 電腦端 ══ */
#desktop-screen{flex:1;display:flex;flex-direction:column;max-width:860px;width:100%;margin:0 auto;padding:0 1.5rem 1.5rem}
.d-section{margin-top:1rem}
.d-top{display:grid;grid-template-columns:210px 1fr;gap:1rem}
.d-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:10px}
.d-panel-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'JetBrains Mono',monospace}
#qr-container{background:#fff;border-radius:10px;padding:8px;width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
#qr-container canvas,#qr-container img{width:100%!important;height:100%!important}
.room-code-box{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;text-align:center}
.room-code-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.room-code-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:4px}
.d-preview-box{flex:1;background:#000;border-radius:12px;overflow:hidden;min-height:140px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.d-preview-box img{width:100%;height:100%;object-fit:contain;display:none}
.no-preview{font-size:12px;color:var(--text3)}
.btn-remote{width:100%;padding:13px;border-radius:13px;background:var(--accent);color:#0d0d0d;font-size:15px;font-weight:700;border:none;display:flex;align-items:center;justify-content:center;gap:9px}
.btn-remote:hover{background:var(--accent2)}
.btn-remote.flash{animation:flashBtn .3s ease}
@keyframes flashBtn{0%{background:var(--accent)}50%{background:#fff}100%{background:var(--accent)}}

.ai-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem}
.ai-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ai-panel-header-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'JetBrains Mono',monospace}
.btn-ai{padding:7px 16px;border-radius:9px;background:var(--accent);color:#0d0d0d;font-weight:700;border:none;font-size:12px}
.btn-ai:hover{background:var(--accent2)}
.ai-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ai-field{background:var(--bg3);border-radius:10px;padding:10px 12px}
.ai-field.full{grid-column:1/-1}
.ai-field-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ai-field-value{font-size:14px;color:var(--text);font-weight:500;word-break:break-all}
.ai-field-value.total{color:var(--accent);font-size:20px;font-family:'JetBrains Mono',monospace}
.ai-placeholder{text-align:center;padding:1.5rem;color:var(--text3);font-size:13px}
.ai-loading{text-align:center;padding:1.5rem;color:var(--text2);font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.photos-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.25rem}
.photos-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.photos-panel-header-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'JetBrains Mono',monospace}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.photo-thumb{aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.photo-thumb:hover{transform:scale(1.04);border-color:var(--border3)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.thumb-actions{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:20px 5px 5px;display:none;flex-direction:column;gap:3px}
.photo-thumb:hover .thumb-actions{display:flex}
.thumb-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:5px;padding:3px;font-size:10px;cursor:pointer}
.thumb-btn:hover{background:rgba(255,255,255,.3)}
.empty-photos{text-align:center;padding:2rem;color:var(--text3);font-size:13px}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;padding:10px 20px;border-radius:24px;border:1px solid var(--border2);opacity:0;transition:all .3s;white-space:nowrap;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

<!-- 手機端 -->
<div id="phone-screen" class="hidden">
  <div class="topbar">
    <button class="btn-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="topbar-icon phone">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div style="flex:1">
      <div class="topbar-title">手機相機</div>
      <div class="topbar-sub" id="p-subtitle">開啟相機，自動連線至電腦</div>
    </div>
  </div>

  <div class="camera-wrap">
    <div class="p-placeholder" id="p-placeholder">
      <div class="p-ph-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <p>點擊「開啟相機」開始</p>
    </div>
    <video id="p-video" autoplay playsinline muted></video>
    <canvas id="p-canvas"></canvas>
    <div class="scan-overlay" id="scan-overlay">
      <div class="scan-frame">
        <div class="sc tl"></div><div class="sc tr"></div>
        <div class="sc bl"></div><div class="sc br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="remote-flash" id="remote-flash"></div>
  </div>

  <div class="p-btns">
    <button class="p-btn primary full" id="p-btn-cam" onclick="startPhoneCamera()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      開啟相機
    </button>
    <button class="p-btn" id="p-btn-manual" onclick="manualCapture()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      手動拍照
    </button>
    <button class="p-btn" onclick="document.getElementById('p-file').click()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上傳圖片
    </button>
    <input type="file" id="p-file" accept="image/*" style="display:none" onchange="handlePhoneUpload(event)">
  </div>

  <div class="p-section">
    <div class="status-bar waiting" id="p-status">
      <div class="s-dot"></div>
      <span id="p-status-text">等待連線至電腦...</span>
    </div>
  </div>
</div>

<!-- 電腦端 -->
<div id="desktop-screen" class="hidden">
  <div class="topbar">
    <button class="btn-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="topbar-icon desktop">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <div style="flex:1">
      <div class="topbar-title">電腦控制端</div>
      <div class="topbar-sub" id="d-subtitle">等待手機連線...</div>
    </div>
  </div>

  <div class="d-section">
    <div class="status-bar waiting" id="d-status">
      <div class="s-dot"></div>
      <span id="d-status-text">手機掃描 QR Code 自動連線</span>
    </div>
  </div>

  <div class="d-top d-section">
    <div class="d-panel">
      <div class="d-panel-label">手機掃碼連線</div>
      <div id="qr-container"><p style="font-size:11px;color:#555;text-align:center">產生中...</p></div>
      <div class="room-code-box">
        <div class="room-code-label">備用代碼</div>
        <div class="room-code-val" id="room-code-display">——</div>
      </div>
    </div>
    <div class="d-panel">
      <div class="d-panel-label">遠端控制</div>
      <div class="d-preview-box">
        <span class="no-preview">連線後顯示最新照片</span>
        <img id="d-preview-img" alt="最新照片">
      </div>
      <button class="btn-remote" id="btn-remote-capture" onclick="sendCapture()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/></svg>
        遠端拍照
      </button>
    </div>
  </div>

  <div class="ai-panel d-section">
    <div class="ai-panel-header">
      <div class="ai-panel-header-label">AI 辨識結果</div>
      <button class="btn-ai" id="btn-ai" onclick="runAI()" disabled>重新辨識</button>
    </div>
    <div id="ai-content"><div class="ai-placeholder">收到照片後自動辨識發票內容</div></div>
  </div>

  <div class="photos-panel d-section">
    <div class="photos-panel-header">
      <div class="photos-panel-header-label">已收到照片</div>
      <span style="font-size:12px;color:var(--text3)" id="photo-count-label">0 張</span>
    </div>
    <div class="photo-grid" id="photo-grid">
      <div class="empty-photos" id="empty-photos">尚未收到任何照片</div>
    </div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
let peer=null,conn=null,hubPeer=null,phoneStream=null;
let photos=[],lastPhotoBase64=null,myRole='',roomCode='';

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function randCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function hide(id){document.getElementById(id).classList.add('hidden')}
function show(id){document.getElementById(id).classList.remove('hidden')}
function setSt(id,tid,type,msg){document.getElementById(id).className='status-bar '+type;document.getElementById(tid).textContent=msg}
const PEER_CFG={host:'0.peerjs.com',port:443,secure:true,path:'/'};

function goBack(){
  if(phoneStream){phoneStream.getTracks().forEach(t=>t.stop());phoneStream=null}
  if(peer){try{peer.destroy()}catch(e){} peer=null}
  if(hubPeer){try{hubPeer.destroy()}catch(e){} hubPeer=null}
  conn=null;
  hide('phone-screen');hide('desktop-screen');
  window.history.replaceState({},'',window.location.pathname);
  autoDetect();
}

function autoDetect(){
  const params=new URLSearchParams(window.location.search);
  const roomParam=params.get('room');
  if(roomParam){startPhone(roomParam.toUpperCase());return}
  const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&window.innerWidth<860);
  if(isMobile) startPhone(null);
  else startDesktop();
}

/* ══ 手機端 ══ */
function startPhone(code){
  myRole='phone';
  show('phone-screen');
  loadPeer(()=>{
    peer=new Peer('inv-p-'+Date.now(),PEER_CFG);
    peer.on('open',()=>{
      if(code){roomCode=code;connectToDesktop()}
      else{setSt('p-status','p-status-text','waiting','自動搜尋電腦中...');tryFindDesktop()}
    });
    peer.on('connection',c=>{conn=c;setupPhoneConn()});
    peer.on('error',e=>setSt('p-status','p-status-text','error','錯誤：'+(e.type||e.message)));
  });
}

function tryFindDesktop(){
  if(!peer)return;
  const hc=peer.connect('inv-hub',PEER_CFG);
  hc.on('open',()=>hc.send({type:'find-desktop'}));
  hc.on('data',d=>{if(d.type==='found'){roomCode=d.code;connectToDesktop()}});
  hc.on('error',()=>setTimeout(tryFindDesktop,3000));
}

function connectToDesktop(){
  setSt('p-status','p-status-text','waiting','連線至電腦中...');
  conn=peer.connect('inv-d-'+roomCode,{reliable:true});
  conn.on('open',()=>{
    setSt('p-status','p-status-text','connected','已連線至電腦！');
    document.getElementById('p-subtitle').textContent='已連線，等待電腦指令';
    conn.send({type:'hello'});
    if(phoneStream)conn.send({type:'ready'});
  });
  conn.on('data',d=>{if(d.type==='capture')phoneTakePhoto()});
  conn.on('close',()=>{setSt('p-status','p-status-text','waiting','連線中斷');conn=null});
  conn.on('error',()=>{setSt('p-status','p-status-text','error','連線失敗');conn=null});
}

function setupPhoneConn(){
  setSt('p-status','p-status-text','connected','已連線至電腦！');
  document.getElementById('p-subtitle').textContent='已連線，等待電腦指令';
  conn.on('data',d=>{if(d.type==='capture')phoneTakePhoto()});
  conn.on('close',()=>{setSt('p-status','p-status-text','waiting','連線中斷');conn=null});
}

async function startPhoneCamera(){
  try{
    phoneStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
    const v=document.getElementById('p-video');
    v.srcObject=phoneStream;v.style.display='block';
    document.getElementById('p-placeholder').style.display='none';
    document.getElementById('scan-overlay').classList.add('on');
    document.getElementById('p-btn-cam').disabled=true;
    document.getElementById('p-btn-manual').disabled=false;
    if(conn&&conn.open)conn.send({type:'ready'});
    if(!document.getElementById('p-status').classList.contains('connected'))
      setSt('p-status','p-status-text','active','相機已開啟，搜尋電腦中...');
  }catch(e){showToast('無法開啟相機：'+e.message)}
}

function phoneTakePhoto(){
  const v=document.getElementById('p-video');
  if(!v.srcObject){showToast('請先開啟相機');return}
  const c=document.getElementById('p-canvas');
  c.width=v.videoWidth||1280;c.height=v.videoHeight||960;
  c.getContext('2d').drawImage(v,0,0);
  const b64=c.toDataURL('image/jpeg',0.88);
  const fl=document.getElementById('remote-flash');
  fl.classList.add('flash');setTimeout(()=>fl.classList.remove('flash'),400);
  showToast('拍照完成，傳送中...');
  if(conn&&conn.open)conn.send({type:'photo',image:b64});
}
function manualCapture(){phoneTakePhoto()}
function handlePhoneUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    if(conn&&conn.open){conn.send({type:'photo',image:ev.target.result});showToast('圖片已傳送')}
    else showToast('尚未連線至電腦');
  };
  r.readAsDataURL(f);e.target.value='';
}

/* ══ 電腦端 ══ */
function startDesktop(){
  myRole='desktop';
  show('desktop-screen');
  roomCode=randCode();
  document.getElementById('room-code-display').textContent=roomCode;
  loadPeer(()=>{
    peer=new Peer('inv-d-'+roomCode,PEER_CFG);
    peer.on('open',()=>{generateQR();setSt('d-status','d-status-text','waiting','等待手機連線... 代碼：'+roomCode);setupHub()});
    peer.on('connection',c=>{conn=c;setupDesktopConn()});
    peer.on('error',e=>{if(e.type==='unavailable-id'){peer.destroy();startDesktop()}else setSt('d-status','d-status-text','error','錯誤：'+e.message)});
  });
}

function setupHub(){
  hubPeer=new Peer('inv-hub',PEER_CFG);
  hubPeer.on('connection',c=>{
    c.on('data',d=>{if(d.type==='find-desktop')c.send({type:'found',code:roomCode})});
  });
  hubPeer.on('error',()=>{});
}

function setupDesktopConn(){
  setSt('d-status','d-status-text','connected','手機已連線！');
  document.getElementById('d-subtitle').textContent='手機已連線，可以遠端拍照';
  document.getElementById('btn-remote-capture').disabled=false;
  conn.on('data',d=>{
    if(d.type==='photo')receivePhoto(d.image);
    else if(d.type==='ready')showToast('手機相機已開啟');
    else if(d.type==='hello')showToast('手機已加入');
  });
  conn.on('close',()=>{setSt('d-status','d-status-text','waiting','手機已中斷...');document.getElementById('btn-remote-capture').disabled=true;conn=null});
}

function sendCapture(){
  if(!conn||!conn.open){showToast('手機尚未連線');return}
  conn.send({type:'capture'});
  const b=document.getElementById('btn-remote-capture');
  b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),350);
}

function receivePhoto(b64){
  lastPhotoBase64=b64;photos.unshift(b64);
  document.getElementById('photo-count-label').textContent=photos.length+' 張';
  document.getElementById('empty-photos').style.display='none';
  const img=document.getElementById('d-preview-img');
  img.src=b64;img.style.display='block';
  const np=document.querySelector('.no-preview');if(np)np.style.display='none';
  addThumb(b64,photos.length);
  showToast('收到照片，辨識中...');
  document.getElementById('btn-ai').disabled=false;
  runAI();
}

function addThumb(b64,idx){
  const grid=document.getElementById('photo-grid');
  const t=document.createElement('div');t.className='photo-thumb';
  const i=document.createElement('img');i.src=b64;i.alt='發票';
  const a=document.createElement('div');a.className='thumb-actions';
  const dl=document.createElement('button');dl.className='thumb-btn';dl.textContent='下載';
  dl.onclick=e=>{e.stopPropagation();dlPhoto(b64,idx)};
  const ai=document.createElement('button');ai.className='thumb-btn';ai.textContent='辨識';
  ai.onclick=e=>{e.stopPropagation();lastPhotoBase64=b64;runAI()};
  a.appendChild(dl);a.appendChild(ai);t.appendChild(i);t.appendChild(a);
  grid.insertBefore(t,grid.firstChild);
}

function dlPhoto(b64,idx){
  const a=document.createElement('a');a.href=b64;
  const n=new Date();
  a.download=`發票_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${idx}.jpg`;
  a.click();
}

function generateQR(){
  const c=document.getElementById('qr-container');c.innerHTML='';
  const url=window.location.href.split('?')[0]+'?room='+roomCode;
  try{new QRCode(c,{text:url,width:160,height:160,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M})}
  catch(e){c.innerHTML='<p style="font-size:11px;color:#555;padding:.5rem;text-align:center">QR 產生失敗<br>請輸入代碼</p>'}
}

/* ══ AI 辨識 ══ */
async function runAI(){
  if(!lastPhotoBase64)return;
  document.getElementById('ai-content').innerHTML='<div class="ai-loading"><span class="spinner"></span>AI 辨識中...</div>';
  document.getElementById('btn-ai').disabled=true;
  try{
    const imgData=lastPhotoBase64.replace(/^data:image\/\w+;base64,/,'');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},
        {type:'text',text:'辨識發票，只回傳 JSON 不含 markdown：{"invoice_number":"發票號碼","date":"日期YYYY/MM/DD","seller":"賣方名稱","seller_tax_id":"賣方統編","buyer_tax_id":"買方統編或無","subtotal":"未稅金額數字","tax":"稅額數字","total":"含稅總計數字","items":"品項摘要20字內"}'}
      ]}]})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'失敗');
    const parsed=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    renderAI(parsed);
  }catch(e){
    document.getElementById('ai-content').innerHTML=`<div class="ai-placeholder" style="color:var(--red)">辨識失敗：${e.message}</div>`;
  }
  document.getElementById('btn-ai').disabled=false;
}

function renderAI(r){
  const m=v=>v&&v!=='—'?'NT$ '+Number(v).toLocaleString():'—';
  document.getElementById('ai-content').innerHTML=`
    <div class="ai-result-grid">
      <div class="ai-field"><div class="ai-field-label">發票號碼</div><div class="ai-field-value">${r.invoice_number||'—'}</div></div>
      <div class="ai-field"><div class="ai-field-label">日期</div><div class="ai-field-value">${r.date||'—'}</div></div>
      <div class="ai-field"><div class="ai-field-label">賣方名稱</div><div class="ai-field-value">${r.seller||'—'}</div></div>
      <div class="ai-field"><div class="ai-field-label">賣方統編</div><div class="ai-field-value">${r.seller_tax_id||'—'}</div></div>
      <div class="ai-field"><div class="ai-field-label">買方統編</div><div class="ai-field-value">${r.buyer_tax_id||'—'}</div></div>
      <div class="ai-field"><div class="ai-field-label">含稅總計</div><div class="ai-field-value total">${m(r.total)}</div></div>
      <div class="ai-field"><div class="ai-field-label">未稅金額</div><div class="ai-field-value">${m(r.subtotal)}</div></div>
      <div class="ai-field"><div class="ai-field-label">稅額</div><div class="ai-field-value">${m(r.tax)}</div></div>
      <div class="ai-field full"><div class="ai-field-label">品項</div><div class="ai-field-value">${r.items||'—'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      <button class="p-btn" onclick='copyAI(${JSON.stringify(r)})'>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>複製
      </button>
      <button class="p-btn" onclick='exportCSV(${JSON.stringify(r)})'>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>CSV
      </button>
    </div>`;
  showToast('辨識完成！');
}

function copyAI(r){
  const lb={invoice_number:'發票號碼',date:'日期',seller:'賣方',seller_tax_id:'賣方統編',buyer_tax_id:'買方統編',subtotal:'未稅金額',tax:'稅額',total:'含稅總計',items:'品項'};
  const lines=Object.entries(lb).map(([k,l])=>`${l}：${r[k]||'—'}`).join('\n');
  navigator.clipboard?navigator.clipboard.writeText(lines).then(()=>showToast('已複製')):(()=>{const t=document.createElement('textarea');t.value=lines;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('已複製')})();
}

function exportCSV(r){
  const h=['發票號碼','日期','賣方','賣方統編','買方統編','未稅金額','稅額','含稅總計','品項'];
  const k=['invoice_number','date','seller','seller_tax_id','buyer_tax_id','subtotal','tax','total','items'];
  const csv='\uFEFF'+h.join(',')+'\n'+k.map(k=>'"'+(r[k]||'').replace(/"/g,'""')+'"').join(',');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  const n=new Date();a.download=`發票_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}.csv`;
  a.click();showToast('CSV 已下載');
}

function loadPeer(cb){
  if(window.Peer){cb();return}
  const s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  s.onload=cb;
  s.onerror=()=>{const s2=document.createElement('script');s2.src='https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js';s2.onload=cb;document.head.appendChild(s2)};
  document.head.appendChild(s);
}

window.addEventListener('load',autoDetect);
</script>
