<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太陽能板配置工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #f4f5f7; color: #222; min-height: 100vh; }
header { background: #0d1f2d; color: #fff; padding: 14px 28px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 17px; font-weight: 600; }
header span { font-size: 12px; color: #7ab8d8; margin-left: 8px; }
.page { max-width: 1140px; margin: 20px auto; padding: 0 16px 48px; }
.main { display: grid; grid-template-columns: minmax(0,1fr) 224px; grid-template-rows: auto auto; border: 1.5px solid #d0d4da; border-radius: 12px; background: #fff; overflow: hidden; }
.cell { border: 0.5px solid #e2e4e8; }
.cell-canvas { grid-column:1; grid-row:1; padding:8px; min-height:460px; display:flex; flex-direction:column; gap:6px; }
.cell-input { grid-column:2; grid-row:1; padding:14px; display:flex; flex-direction:column; gap:0; overflow-y:auto; max-height:780px; }
.cell-stats { grid-column:1; grid-row:2; padding:10px 14px; }
.cell-btns { grid-column:2; grid-row:2; padding:14px; display:flex; flex-direction:column; gap:6px; justify-content:center; }
.tab-bar { display:flex; gap:4px; flex-shrink:0; }
.tab { flex:1; padding:6px; text-align:center; font-size:12px; cursor:pointer; border:1px solid #d0d4da; border-radius:7px; color:#666; background:#fafbfc; font-family:inherit; transition:all .15s; }
.tab.sel { background:#0d1f2d; color:#fff; border-color:#0d1f2d; font-weight:600; }
.tab-locked { color:#bbb !important; border-color:#e0e0e0 !important; background:#f8f8f8 !important; cursor:not-allowed !important; opacity:0.7; }
.canvas-wrap { background:#e8e9ec; border-radius:8px; flex:1; display:flex; align-items:center; justify-content:center; overflow:auto; padding:4px; min-height:200px; }
/* PDF 預覽區 */
.pdf-preview { background:#fff; border:0.5px solid #d0d4da; border-radius:8px; overflow:auto; position:relative; flex-shrink:0; max-height:240px; display:flex; align-items:center; justify-content:center; }
.empty-hint { color:#aaa; font-size:13px; text-align:center; line-height:1.8; }
.sec-title { font-size:10px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; margin-top:12px; }
.sec-title:first-child { margin-top:0; }
.gap-col { display:flex; flex-direction:column; gap:7px; margin-bottom:4px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.field { display:flex; flex-direction:column; gap:2px; }
.field label { font-size:11px; color:#555; }
.field input[type=number], .field input[type=text] { width:100%; padding:5px 7px; border:1px solid #d0d4da; border-radius:6px; font-size:12px; color:#222; background:#fafbfc; font-family:inherit; }
.field input:focus { outline:none; border-color:#378ADD; background:#fff; }
.orient-btns { display:flex; gap:5px; margin-top:2px; }
.orient-btn { flex:1; border:1px solid #d0d4da; border-radius:6px; padding:5px; text-align:center; font-size:11px; cursor:pointer; color:#666; background:#fafbfc; font-family:inherit; transition:all .15s; }
.orient-btn.sel { border-color:#378ADD; background:#e6f1fb; color:#185FA5; font-weight:600; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-top:1px solid #f0f0f0; }
.toggle-label { font-size:11px; color:#555; }
.toggle { position:relative; width:32px; height:18px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; position:absolute; }
.toggle-track { position:absolute; inset:0; background:#ccc; border-radius:99px; cursor:pointer; transition:background .2s; }
.toggle input:checked + .toggle-track { background:#378ADD; }
.toggle-thumb { position:absolute; top:3px; left:3px; width:12px; height:12px; background:#fff; border-radius:50%; transition:transform .2s; pointer-events:none; }
.toggle input:checked ~ .toggle-thumb { transform:translateX(14px); }
.stats { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.stat { background:#f4f5f7; border-radius:8px; padding:7px 9px; }
.stat .lbl { font-size:10px; color:#888; margin-bottom:2px; }
.stat .val { font-size:15px; font-weight:700; color:#0d1f2d; line-height:1; }
.stat .unt { font-size:9px; color:#aaa; margin-top:2px; }
.legend { display:flex; gap:12px; font-size:10px; color:#666; flex-wrap:wrap; margin-top:8px; }
.legend-item { display:flex; align-items:center; gap:4px; }
.legend-box { width:13px; height:9px; border-radius:1px; flex-shrink:0; }
.btn-gen { background:#0d1f2d; color:#fff; border:none; border-radius:8px; padding:9px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s; }
.btn-gen:hover { background:#1a3a52; }
.btn-dl { border:1px solid #d0d4da; background:#fff; color:#333; border-radius:8px; padding:7px; font-size:11px; cursor:pointer; font-family:inherit; transition:all .15s; }
.btn-dl:hover { border-color:#378ADD; color:#185FA5; background:#f0f7ff; }
.note { font-size:10px; color:#aaa; line-height:1.4; margin-top:3px; }
.font-row { display:flex; align-items:center; gap:6px; }
.font-row label { font-size:11px; color:#555; white-space:nowrap; }
.font-row input[type=range] { flex:1; }
.font-row span { font-size:11px; color:#222; min-width:18px; text-align:right; }
.upload-zone { border:1.5px dashed #d0d4da; border-radius:8px; padding:12px; text-align:center; cursor:pointer; transition:all .15s; }
.upload-zone:hover { border-color:#378ADD; background:#f0f7ff; }
.upload-zone.has-file { border-color:#378ADD; background:#e6f1fb; }
.upload-zone p { font-size:12px; color:#555; margin-bottom:2px; }
.upload-zone small { font-size:10px; color:#aaa; }
.chip-wrap { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.chip { font-size:11px; padding:3px 8px; border-radius:99px; cursor:pointer; border:1px solid; font-family:inherit; }
.chip.sel { color:#fff; }
.status-msg { font-size:11px; padding:6px 9px; border-radius:7px; margin-top:5px; line-height:1.5; }
.status-ok { background:#EAF3DE; color:#3B6D11; }
.status-err { background:#FCEBEB; color:#A32D2D; }
.status-info { background:#E6F1FB; color:#185FA5; }
.panel-section { display:none; }
.panel-section.active { display:block; }
.search-btn { width:100%; border:1px solid #d0d4da; background:#fafbfc; color:#333; border-radius:7px; padding:6px; font-size:12px; cursor:pointer; font-family:inherit; transition:all .15s; margin-top:2px; }
.search-btn:hover { border-color:#378ADD; color:#185FA5; }
@media (max-width:700px) {
  .main { grid-template-columns:1fr; }
  .cell-input { grid-column:1; grid-row:2; max-height:none; }
  .cell-stats { grid-column:1; grid-row:3; }
  .cell-btns { grid-column:1; grid-row:4; flex-direction:row; flex-wrap:wrap; }
  .stats { grid-template-columns:repeat(3,1fr); }
}
</style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
    <rect x="2" y="8" width="24" height="14" rx="2" fill="#378ADD" opacity="0.3"/>
    <rect x="2" y="8" width="24" height="14" rx="2" stroke="#7ab8d8" stroke-width="1.2"/>
    <line x1="2" y1="15" x2="26" y2="15" stroke="#7ab8d8" stroke-width="0.8"/>
    <line x1="8" y1="8" x2="8" y2="22" stroke="#7ab8d8" stroke-width="0.8"/>
    <line x1="14" y1="8" x2="14" y2="22" stroke="#7ab8d8" stroke-width="0.8"/>
    <line x1="20" y1="8" x2="20" y2="22" stroke="#7ab8d8" stroke-width="0.8"/>
    <line x1="14" y1="2" x2="14" y2="6" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="4" x2="18" y2="7" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="4" x2="10" y2="7" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <h1>太陽能板配置工具 <span>Solar Panel Layout</span></h1>
</header>

<div class="page">
<div class="main">

  <div class="cell cell-canvas">
    <div class="tab-bar">
      <button class="tab sel" onclick="switchMode('rect')">矩形區域</button>
      <button class="tab tab-locked" onclick="showLocked()" title="此功能需要授權">非矩形區域 🔒</button>
    </div>
    <!-- 矩形配置圖 -->
    <div id="view-rect" style="flex:1;display:flex;align-items:stretch;">
      <div class="canvas-wrap" id="canvasArea"><p class="empty-hint">點擊「生成配置圖」開始</p></div>
    </div>
    <!-- 非矩形：PDF預覽 + 配置圖 -->
    <div id="view-pdf" style="flex:1;display:none;flex-direction:column;gap:6px;">
      <div class="pdf-preview" id="pdfPreview">
        <p class="empty-hint" id="previewHint">上傳地籍圖 PDF 後預覽<br><small style="color:#bbb;">點擊地號文字可直接選取</small></p>
        <canvas id="pdfCanvas" style="display:none;max-width:100%;"></canvas>
      </div>
      <div class="canvas-wrap" id="resultArea" style="min-height:180px;display:none;">
        <p class="empty-hint">點擊「生成配置圖」產生排佈結果</p>
      </div>
    </div>
  </div>

  <div class="cell cell-input">

    <div class="sec-title">太陽能板</div>
    <div class="gap-col">
      <div class="field"><label>型號</label><input type="text" id="model" value="Tiger Neo N-type"></div>
      <div class="row2">
        <div class="field"><label>瓦數 (W)</label><input type="number" id="watt" value="580" min="1"></div>
        <div class="field"><label>邊距 (mm)</label><input type="number" id="margin" value="0" min="0"></div>
      </div>
      <div class="row2">
        <div class="field"><label>長度 (mm)</label><input type="number" id="plen" value="2278" min="1"></div>
        <div class="field"><label>寬度 (mm)</label><input type="number" id="pwid" value="1134" min="1"></div>
      </div>
      <div class="field">
        <label>排列方向</label>
        <div class="orient-btns">
          <button class="orient-btn sel" id="btn-v" onclick="setOrient('v')">直式 ↕</button>
          <button class="orient-btn" id="btn-h" onclick="setOrient('h')">橫式 ↔</button>
        </div>
      </div>
    </div>

    <!-- 矩形鋪排區域 -->
    <div id="sec-rect" class="panel-section active">
      <div class="sec-title">鋪排區域</div>
      <div class="gap-col">
        <div class="row2">
          <div class="field"><label>寬度 (mm)</label><input type="number" id="awidth" value="8000" min="1"></div>
          <div class="field"><label>長度 (mm)</label><input type="number" id="alength" value="6000" min="1"></div>
        </div>
        <div class="field"><label>太陽能板間距 (mm)</label><input type="number" id="gap" value="20" min="0"></div>
      </div>
    </div>

    <!-- 非矩形地籍圖 -->
    <div id="sec-pdf" class="panel-section">
      <div class="sec-title">非矩形區域</div>
      <div class="gap-col">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('pdfInput').click()">
          <p>點擊上傳地籍圖 PDF</p>
          <small>支援 CAD 匯出向量 PDF</small>
          <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="handlePDF(this)">
        </div>
        <div id="pdfStatus" style="display:none;"></div>
        <div class="field">
          <label>搜尋地號（逗號分隔）</label>
          <input type="text" id="parcelSearch" placeholder="例：658,659,660">
        </div>
        <button class="search-btn" onclick="searchParcels()">搜尋地號</button>
        <div id="chipsWrap" class="chip-wrap" style="display:none;"></div>
        <div class="field"><label>太陽能板間距 (mm)</label><input type="number" id="gapPdf" value="20" min="0"></div>
      </div>
    </div>

    <div class="sec-title">逆變器</div>
    <div class="gap-col">
      <div class="field"><label>型號</label><input type="text" id="inv-model" value="MIN 6000TL-X"></div>
      <div class="field"><label>容量 (kW)</label><input type="number" id="inv-kw" value="6" min="0.1" step="0.1"></div>
      <div class="toggle-row">
        <span class="toggle-label">允許 1.2 倍超載</span>
        <label class="toggle"><input type="checkbox" id="inv-over" checked><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
      </div>
      <div class="note" id="inv-note">允許超載：容量 × 1.2（含等於）</div>
    </div>

    <div class="sec-title">標註設定</div>
    <div class="gap-col">
      <div class="font-row">
        <label>字體大小</label>
        <input type="range" id="font-size" min="6" max="20" value="12" step="1"
          oninput="document.getElementById('font-val').textContent=this.value">
        <span id="font-val">12</span>
      </div>
    </div>

    <div id="over-row" class="toggle-row" style="margin-top:4px;">
      <span class="toggle-label">允許超出屋頂 1m</span>
      <label class="toggle"><input type="checkbox" id="allow-over" checked><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
    </div>

  </div>

  <div class="cell cell-stats">
    <div class="stats">
      <div class="stat"><div class="lbl">配置片數</div><div class="val" id="s-count">—</div><div class="unt">片</div></div>
      <div class="stat"><div class="lbl">總瓦數</div><div class="val" id="s-watt">—</div><div class="unt">kW</div></div>
      <div class="stat"><div class="lbl" id="lbl-grid">排列</div><div class="val" id="s-grid">—</div><div class="unt" id="unt-grid">欄×列</div></div>
      <div class="stat"><div class="lbl">逆變器</div><div class="val" id="s-inv">—</div><div class="unt">台</div></div>
      <div class="stat"><div class="lbl" id="lbl-area">超出區域</div><div class="val" id="s-area">—</div><div class="unt" id="unt-area">片</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-box" style="background:#121e2a;border:1.5px solid #8aa8be;"></div>區域內</div>
      <div class="legend-item"><div class="legend-box" style="background:#1e3020;border:1.5px solid #7aaa62;"></div>超出（≤1m）</div>
      <div class="legend-item"><div class="legend-box" style="border:2px solid #cc2200;background:transparent;"></div>鋪排區域</div>
    </div>
  </div>

  <div class="cell cell-btns">
    <button class="btn-gen" onclick="generate()">生成配置圖</button>
    <button class="btn-dl" onclick="downloadPNG()">下載 PNG 檔案</button>
    <button class="btn-dl" onclick="downloadDXF()">下載 DXF 檔案</button>
  </div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ── 全域變數 ──
let orient = 'v', lastSVG = '', lastPanels = [], lastVals = {};
let currentMode = 'rect';
let pdfDoc = null, pdfVp = null, pdfAllSegPts = [], pdfTexts = [];
let parsedParcels = {}, selectedParcels = new Set();
const COLORS = ['#cc2200','#1D9E75','#378ADD','#BA7517','#534AB7','#993556','#0F6E56','#854F0B'];
const PT_TO_REAL_MM = 0.3528 * 500; // 比例尺 1/500

if (typeof pdfjsLib !== 'undefined')
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

document.getElementById('inv-over').addEventListener('change', function () {
  document.getElementById('inv-note').textContent =
    this.checked ? '允許超載：容量 × 1.2（含等於）' : '不允許超載：依額定容量計算';
});

// ── 模式切換 ──
function showLocked() {
  alert('非矩形區域功能目前已鎖定，如需使用請聯絡管理員。');
}

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.tab').forEach((t, i) => t.className = 'tab' + ((['rect','pdf'][i] === m) ? ' sel' : ''));
  document.getElementById('sec-rect').className = 'panel-section' + (m === 'rect' ? ' active' : '');
  document.getElementById('sec-pdf').className = 'panel-section' + (m === 'pdf' ? ' active' : '');
  document.getElementById('view-rect').style.display = m === 'rect' ? 'flex' : 'none';
  document.getElementById('view-pdf').style.display = m === 'pdf' ? 'flex' : 'none';
  document.getElementById('over-row').style.display = m === 'rect' ? '' : 'none';
  if (m === 'pdf') {
    document.getElementById('lbl-grid').textContent = '地號數';
    document.getElementById('unt-grid').textContent = '筆';
    document.getElementById('lbl-area').textContent = '總面積';
    document.getElementById('unt-area').textContent = 'm²';
  } else {
    document.getElementById('lbl-grid').textContent = '排列';
    document.getElementById('unt-grid').textContent = '欄×列';
    document.getElementById('lbl-area').textContent = '超出區域';
    document.getElementById('unt-area').textContent = '片';
  }
}

function setOrient(o) {
  orient = o;
  document.getElementById('btn-v').className = 'orient-btn' + (o === 'v' ? ' sel' : '');
  document.getElementById('btn-h').className = 'orient-btn' + (o === 'h' ? ' sel' : '');
}
function gf(id) { return parseFloat(document.getElementById(id).value) || 0; }
function gs(id) { return document.getElementById(id).value || ''; }
function se(id, v) { document.getElementById(id).textContent = v; }
function gb(id) { return document.getElementById(id).checked; }
function getFont() { return parseInt(document.getElementById('font-size').value) || 12; }

function showStatus(msg, type) {
  const el = document.getElementById('pdfStatus');
  el.style.display = ''; el.className = 'status-msg status-' + type; el.textContent = msg;
}

// ── PDF 上傳與射線法分析 ──
async function handlePDF(input) {
  const file = input.files[0]; if (!file) return;
  const zone = document.getElementById('uploadZone');
  zone.className = 'upload-zone has-file';
  zone.querySelector('p').textContent = file.name;
  zone.querySelector('small').textContent = `${(file.size/1024).toFixed(1)} KB`;
  showStatus('讀取 PDF 中...', 'status-info');
  try {
    const ab = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
    const page = await pdfDoc.getPage(1);
    pdfVp = page.getViewport({ scale: 1 });

    // 渲染預覽
    const cvs = document.getElementById('pdfCanvas');
    const vp15 = page.getViewport({ scale: 1.5 });
    cvs.width = vp15.width; cvs.height = vp15.height;
    cvs.style.display = 'block';
    document.getElementById('previewHint').style.display = 'none';
    await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp15 }).promise;

    // 提取文字（y 從上往下 = pageHeight - transform[5]）
    const tc = await page.getTextContent();
    pdfTexts = tc.items.map(item => ({
      str: item.str.trim(),
      x: item.transform[4],
      y: pdfVp.height - item.transform[5]
    })).filter(t => t.str.length > 0);

    // 提取所有線段（射線法用）
    const ops = await page.getOperatorList();
    pdfAllSegPts = extractSegments(ops, pdfVp);

    const parcelCount = pdfTexts.filter(t => /^\d+(-\d+)?$/.test(t.str)).length;
    showStatus(`PDF 載入成功（${parcelCount} 個地號文字、${pdfAllSegPts.length} 條線段）。請輸入地號或點擊預覽圖上的地號。`, 'status-ok');

    // 點擊選取
    cvs.onclick = (e) => {
      const rect = cvs.getBoundingClientRect();
      const sx = pdfVp.width / cvs.offsetWidth, sy = pdfVp.height / cvs.offsetHeight;
      const cx = (e.clientX - rect.left) * sx, cy = (e.clientY - rect.top) * sy;
      let best = null, bestD = Infinity;
      for (const t of pdfTexts) {
        if (!/^\d+(-\d+)?$/.test(t.str)) continue;
        const d = Math.hypot(t.x - cx, t.y - cy);
        if (d < bestD && d < 60) { bestD = d; best = t; }
      }
      if (best) selectParcelByPoint(best.str, best.x, best.y);
      else showStatus('未偵測到地號文字，請點擊地號數字附近', 'status-err');
    };
  } catch (e) { showStatus('PDF 載入失敗：' + e.message, 'status-err'); }
}

function extractSegments(ops, vp) {
  const segs = [], OPS = pdfjsLib.OPS;
  let cur = [];
  for (let i = 0; i < ops.fnArray.length; i++) {
    const fn = ops.fnArray[i], args = ops.argsArray[i];
    const sy = (y) => vp.height - y; // PDF y（從下往上）→ 螢幕 y（從上往下）
    if (fn === OPS.moveTo) { cur = [[args[0], sy(args[1])]]; }
    else if (fn === OPS.lineTo) { if (cur.length) cur.push([args[0], sy(args[1])]); }
    else if (fn === OPS.curveTo) { if (cur.length) cur.push([args[4], sy(args[5])]); }
    else if ([OPS.closePath, OPS.stroke, OPS.fill, OPS.eoFill,
              OPS.fillStroke, OPS.eoFillStroke].includes(fn)) {
      if (cur.length >= 2) segs.push([...cur]);
      cur = [];
    } else if (fn === OPS.endPath) { cur = []; }
  }
  return segs;
}

// ── 射線法：找最近交叉點 ──
function rayNearest(px, py, angle, segs) {
  const dx = Math.cos(angle), dy = Math.sin(angle);
  let bestT = Infinity, bestPt = null;
  for (const seg of segs) {
    for (let i = 0; i < seg.length - 1; i++) {
      const [x1, y1] = seg[i], [x2, y2] = seg[i + 1];
      const sx = x2 - x1, sy2 = y2 - y1;
      const denom = dx * sy2 - dy * sx;
      if (Math.abs(denom) < 1e-10) continue;
      const t = ((x1 - px) * sy2 - (y1 - py) * sx) / denom;
      const u = ((x1 - px) * dy - (y1 - py) * dx) / denom;
      if (t > 0.5 && u >= 0 && u <= 1 && t < bestT) {
        bestT = t; bestPt = [px + t * dx, py + t * dy];
      }
    }
  }
  return bestPt;
}

function buildPolygon(lx, ly, nRays = 48) {
  const pts = [];
  for (let i = 0; i < nRays; i++) {
    const angle = 2 * Math.PI * i / nRays;
    const pt = rayNearest(lx, ly, angle, pdfAllSegPts);
    if (pt) pts.push([Math.round(pt[0] * 10) / 10, Math.round(pt[1] * 10) / 10]);
  }
  return pts;
}

function selectParcelByPoint(name, lx, ly) {
  if (parsedParcels[name]) {
    if (selectedParcels.has(name)) { selectedParcels.delete(name); }
    else { selectedParcels.add(name); }
    updateChips(); highlightSelected(); return;
  }
  const pts = buildPolygon(lx, ly, 48);
  if (pts.length < 4) { showStatus(`無法重建地號 ${name} 的輪廓，請嘗試其他位置`, 'status-err'); return; }
  const area = polyArea(pts) * PT_TO_REAL_MM * PT_TO_REAL_MM / 1e6;
  parsedParcels[name] = { pts, area: Math.round(area * 10) / 10 };
  selectedParcels.add(name);
  showStatus(`已選取地號 ${name}（面積約 ${parsedParcels[name].area} m²）`, 'status-ok');
  updateChips(); highlightSelected();
}

async function searchParcels() {
  if (!pdfDoc) { showStatus('請先上傳 PDF 檔案', 'status-err'); return; }
  const targets = gs('parcelSearch').split(/[,，\s]+/).map(s => s.trim()).filter(Boolean);
  if (!targets.length) { showStatus('請輸入地號', 'status-err'); return; }
  showStatus('搜尋中...', 'status-info');
  let found = 0;
  for (const target of targets) {
    if (parsedParcels[target]) { selectedParcels.add(target); found++; continue; }
    // 多種比對
    const matches = pdfTexts.filter(t => {
      const s = t.str.replace(/\s/g, ''), tgt = target.replace(/\s/g, '');
      return s === tgt || s.includes(tgt) || tgt.includes(s);
    });
    // 嘗試拼接
    if (!matches.length) {
      const j = tryJoin(target);
      if (j) matches.push(j);
    }
    if (!matches.length) continue;
    const lx = matches[0].x, ly = matches[0].y;
    const pts = buildPolygon(lx, ly, 48);
    if (pts.length >= 4) {
      const area = polyArea(pts) * PT_TO_REAL_MM * PT_TO_REAL_MM / 1e6;
      parsedParcels[target] = { pts, area: Math.round(area * 10) / 10 };
      selectedParcels.add(target); found++;
    }
  }
  const notFound = targets.filter(t => !parsedParcels[t]);
  let msg = found > 0 ? `找到 ${found} 個地號：${targets.filter(t=>parsedParcels[t]).join('、')}` : '未找到任何地號';
  if (notFound.length) msg += `；未找到：${notFound.join('、')}（可直接點擊預覽圖上的地號文字）`;
  showStatus(msg, found > 0 ? 'status-ok' : 'status-err');
  updateChips(); highlightSelected();
}

function tryJoin(target) {
  for (let i = 0; i < pdfTexts.length; i++)
    for (let j = i + 1; j < pdfTexts.length; j++) {
      const c = (pdfTexts[i].str + pdfTexts[j].str).replace(/\s/g, '');
      if (c === target.replace(/\s/g, '') && Math.hypot(pdfTexts[i].x - pdfTexts[j].x, pdfTexts[i].y - pdfTexts[j].y) < 30)
        return { str: c, x: (pdfTexts[i].x + pdfTexts[j].x) / 2, y: (pdfTexts[i].y + pdfTexts[j].y) / 2 };
    }
  return null;
}

function updateChips() {
  const wrap = document.getElementById('chipsWrap');
  const sel = [...selectedParcels];
  if (!sel.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex'; wrap.innerHTML = '';
  sel.forEach((name, i) => {
    const color = COLORS[i % COLORS.length];
    const chip = document.createElement('button');
    chip.className = 'chip sel';
    chip.style.borderColor = color; chip.style.color = '#fff'; chip.style.background = color;
    chip.textContent = `${name} (${parsedParcels[name]?.area || '?'}m²)`;
    chip.title = '點擊移除';
    chip.onclick = () => { selectedParcels.delete(name); updateChips(); highlightSelected(); };
    wrap.appendChild(chip);
  });
}

function highlightSelected() {
  const cvs = document.getElementById('pdfCanvas');
  if (!cvs || cvs.style.display === 'none') return;
  let ov = document.getElementById('pdfOverlay');
  if (!ov) {
    ov = document.createElement('canvas'); ov.id = 'pdfOverlay';
    ov.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
    cvs.parentElement.style.position = 'relative'; cvs.parentElement.appendChild(ov);
  }
  ov.width = cvs.width; ov.height = cvs.height;
  const ctx = ov.getContext('2d');
  ctx.clearRect(0, 0, ov.width, ov.height);
  const sx = cvs.width / pdfVp.width, sy = cvs.height / pdfVp.height;
  [...selectedParcels].forEach((name, i) => {
    const p = parsedParcels[name]; if (!p) return;
    const color = COLORS[i % COLORS.length];
    ctx.beginPath();
    ctx.moveTo(p.pts[0][0] * sx, p.pts[0][1] * sy);
    for (let k = 1; k < p.pts.length; k++) ctx.lineTo(p.pts[k][0] * sx, p.pts[k][1] * sy);
    ctx.closePath();
    ctx.fillStyle = color + '44'; ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
    const cx = p.pts.reduce((s, v) => s + v[0], 0) / p.pts.length;
    const cy = p.pts.reduce((s, v) => s + v[1], 0) / p.pts.length;
    ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = color; ctx.textAlign = 'center';
    ctx.fillText(name, cx * sx, cy * sy + 5);
  });
}

function polyArea(poly) {
  let a = 0, n = poly.length;
  for (let i = 0; i < n; i++) { const j = (i + 1) % n; a += poly[i][0] * poly[j][1] - poly[j][0] * poly[i][1]; }
  return Math.abs(a) / 2;
}

function pointInPoly(px, py, poly) {
  let inside = false, n = poly.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

// ── 繪圖共用 ──
function isInside(px, py, pW, pH, aw, al, mg) {
  return px >= mg && py >= mg && (px + pW) <= (aw - mg) && (py + pH) <= (al - mg);
}

function drawPanel(svg, rx, ry, rw, rh, isOver) {
  const ns = 'http://www.w3.org/2000/svg';
  const b = document.createElementNS(ns, 'rect');
  b.setAttribute('x', rx); b.setAttribute('y', ry); b.setAttribute('width', rw); b.setAttribute('height', rh);
  b.setAttribute('fill', isOver ? '#1e3020' : '#121e2a'); b.setAttribute('rx', '1'); svg.appendChild(b);
  for (let i = 1; i < 6; i++) {
    const l = document.createElementNS(ns, 'line'), ly = ry + (rh / 6) * i;
    l.setAttribute('x1', rx + 1); l.setAttribute('x2', rx + rw - 1);
    l.setAttribute('y1', ly); l.setAttribute('y2', ly);
    l.setAttribute('stroke', isOver ? '#3a5a3a' : '#1e3545'); l.setAttribute('stroke-width', '0.4'); svg.appendChild(l);
  }
  for (let i = 1; i < 4; i++) {
    const l = document.createElementNS(ns, 'line'), lx = rx + (rw / 4) * i;
    l.setAttribute('x1', lx); l.setAttribute('x2', lx);
    l.setAttribute('y1', ry + 1); l.setAttribute('y2', ry + rh - 1);
    l.setAttribute('stroke', isOver ? '#3a5a3a' : '#1e3545'); l.setAttribute('stroke-width', '0.4'); svg.appendChild(l);
  }
  const f = document.createElementNS(ns, 'rect');
  f.setAttribute('x', rx); f.setAttribute('y', ry); f.setAttribute('width', rw); f.setAttribute('height', rh);
  f.setAttribute('fill', 'none'); f.setAttribute('stroke', isOver ? '#7aaa62' : '#8aa8be');
  f.setAttribute('stroke-width', '1.2'); f.setAttribute('rx', '1'); svg.appendChild(f);
}

function svgLine(svg, x1, y1, x2, y2, stroke, sw) {
  const ns = 'http://www.w3.org/2000/svg', l = document.createElementNS(ns, 'line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1); l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  l.setAttribute('stroke', stroke); l.setAttribute('stroke-width', sw || '0.7'); svg.appendChild(l);
}

function estimateTextW(txt, fs) { return txt.length * fs * 0.6; }

function drawDimH(svg, x1, x2, y, label, color, slots) {
  const fs = getFont(), cx = (x1 + x2) / 2, tw = estimateTextW(label, fs);
  svgLine(svg, x1, y, x2, y, color);
  svgLine(svg, x1, y - 4, x1, y + 4, color);
  svgLine(svg, x2, y - 4, x2, y + 4, color);
  let ty = y - (fs * 0.6 + 2), rh2 = fs + 3, bumped = true, tries = 0;
  while (bumped && tries < 6) {
    bumped = false;
    for (const s of slots) { if (Math.abs(s.ty - ty) < rh2 && Math.abs(s.cx - cx) < (s.tw / 2 + tw / 2 + 4)) { ty -= rh2; bumped = true; break; } }
    tries++;
  }
  slots.push({ cx, ty, tw });
  const ns = 'http://www.w3.org/2000/svg', t = document.createElementNS(ns, 'text');
  t.setAttribute('x', cx); t.setAttribute('y', ty); t.setAttribute('text-anchor', 'middle');
  t.setAttribute('font-size', fs); t.setAttribute('fill', color); t.setAttribute('font-family', 'sans-serif');
  t.textContent = label; svg.appendChild(t);
}

function drawDimV(svg, y1, y2, x, label, color, slots) {
  const fs = getFont(), cy = (y1 + y2) / 2, tw = estimateTextW(label, fs);
  svgLine(svg, x, y1, x, y2, color);
  svgLine(svg, x - 4, y1, x + 4, y1, color);
  svgLine(svg, x - 4, y2, x + 4, y2, color);
  let tx = x - (fs * 0.6 + 2), cw = fs + 3, bumped = true, tries = 0;
  while (bumped && tries < 6) {
    bumped = false;
    for (const s of slots) { if (Math.abs(s.tx - tx) < cw && Math.abs(s.cy - cy) < (s.tw / 2 + tw / 2 + 4)) { tx -= cw; bumped = true; break; } }
    tries++;
  }
  slots.push({ tx, cy, tw });
  const ns = 'http://www.w3.org/2000/svg', t = document.createElementNS(ns, 'text');
  t.setAttribute('x', tx); t.setAttribute('y', cy); t.setAttribute('text-anchor', 'middle');
  t.setAttribute('font-size', fs); t.setAttribute('fill', color); t.setAttribute('font-family', 'sans-serif');
  t.setAttribute('transform', `rotate(-90,${tx},${cy})`);
  t.textContent = label; svg.appendChild(t);
}

// ── 主生成入口 ──
function generate() {
  if (currentMode === 'pdf') generatePDF();
  else generateRect();
}

// ── 矩形模式 ──
function generateRect() {
  const plen = gf('plen') || 2278, pwid = gf('pwid') || 1134;
  const gap = gf('gap') || 20, aw = gf('awidth') || 8000, al = gf('alength') || 6000;
  const mg = gf('margin'), watt = gf('watt') || 580, invKw = gf('inv-kw') || 6;
  const allowOver = gb('allow-over'), invOver = gb('inv-over');
  const pH = orient === 'v' ? plen : pwid, pW = orient === 'v' ? pwid : plen;
  const OVER = allowOver ? 1000 : 0;

  const cols = Math.floor((aw + OVER * 2 + gap) / (pW + gap));
  const rows = Math.floor((al + OVER * 2 + gap) / (pH + gap));
  const totalPW = cols * (pW + gap) - gap, totalPH = rows * (pH + gap) - gap;
  const startX = (aw - totalPW) / 2, startY = (al - totalPH) / 2;

  let panels = [], vCols = 0, vRows = 0;
  for (let c = 0; c < cols; c++) {
    let has = false;
    for (let r = 0; r < rows; r++) {
      const x = startX + c * (pW + gap), y = startY + r * (pH + gap);
      if (x < -OVER || y < -OVER || x + pW > aw + OVER || y + pH > al + OVER) continue;
      panels.push({ x, y, inside: isInside(x, y, pW, pH, aw, al, mg),
        overXLeft: Math.max(0,-x), overXRight: Math.max(0, x+pW-aw),
        overYTop: Math.max(0,-y), overYBottom: Math.max(0, y+pH-al) });
      has = true; if (c === 0) vRows++;
    }
    if (has) vCols++;
  }

  lastPanels = panels; lastVals = { pW, pH, aw, al, watt, invKw, gap, mg };
  const count = panels.length, inside = panels.filter(p => p.inside).length;
  const totalKw = count * watt / 1000;
  const invCap = invOver ? invKw * 1.2 : invKw;
  const fic = (() => { const n = Math.ceil(totalKw / invCap); return totalKw <= n * invCap + 1e-9 ? n : n + 1; })();
  se('s-count', count); se('s-watt', totalKw.toFixed(2));
  se('s-grid', vCols + '×' + vRows); se('s-inv', fic); se('s-area', count - inside);

  let mL = 0, mR = 0, mT = 0, mB = 0;
  if (allowOver) panels.forEach(p => { if (!p.inside) {
    mL = Math.max(mL, p.overXLeft); mR = Math.max(mR, p.overXRight);
    mT = Math.max(mT, p.overYTop); mB = Math.max(mB, p.overYBottom); }});

  const ns = 'http://www.w3.org/2000/svg', fs = getFont();
  // 標註完全在板子/紅框外側
  // 上方留：DIM_OFFSET（標線）+ extraPad（碰撞偏移空間）
  const DIM_OFFSET = fs * 1.8 + 8 + 25;
  const extraPad = fs * 3 + 8;
  const topPad = DIM_OFFSET + extraPad + 10;
  const leftPad = DIM_OFFSET + extraPad + 10;
  const botPad = 20, rightPad = 16;

  const area = document.getElementById('canvasArea');
  const canW = Math.max(area.clientWidth - 16, 400);
  const dispOver = Math.max(OVER, 200);
  const viewW = aw + dispOver * 2, viewH = al + dispOver * 2;
  const scale = (canW - leftPad - rightPad) / viewW;
  const canH = viewH * scale + topPad + botPad + 8;
  const ox = leftPad + dispOver * scale, oy = topPad + dispOver * scale;

  area.innerHTML = '';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', canW); svg.setAttribute('height', canH);
  svg.setAttribute('viewBox', `0 0 ${canW} ${canH}`);
  svg.setAttribute('xmlns', ns); svg.style.display = 'block';

  // 超出範圍底色
  if (allowOver) {
    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', leftPad); bg.setAttribute('y', topPad);
    bg.setAttribute('width', viewW * scale); bg.setAttribute('height', viewH * scale);
    bg.setAttribute('fill', '#e8f0e0'); bg.setAttribute('stroke', '#7aaa62');
    bg.setAttribute('stroke-width', '0.6'); bg.setAttribute('stroke-dasharray', '4,3'); svg.appendChild(bg);
  }

  // 主區域底色
  const bgM = document.createElementNS(ns, 'rect');
  bgM.setAttribute('x', ox); bgM.setAttribute('y', oy);
  bgM.setAttribute('width', aw * scale); bgM.setAttribute('height', al * scale);
  bgM.setAttribute('fill', '#e8e6e0'); svg.appendChild(bgM);

  // 太陽能板（畫在紅框之前）
  panels.forEach(p => drawPanel(svg, ox + p.x * scale, oy + p.y * scale, pW * scale, pH * scale, !p.inside));

  // 紅框（在板子上方，但標註在框外）
  const rr = document.createElementNS(ns, 'rect');
  rr.setAttribute('x', ox); rr.setAttribute('y', oy);
  rr.setAttribute('width', aw * scale); rr.setAttribute('height', al * scale);
  rr.setAttribute('fill', 'none'); rr.setAttribute('stroke', '#cc2200'); rr.setAttribute('stroke-width', '2.5'); svg.appendChild(rr);

  // ── 標註線：起點在圖面外側，不蓋在板子上 ──
  // 水平標線：放在 topPad 區域（板子上方）
  // dimY 保證在紅框上緣之上（oy - DIM_OFFSET），且 topPad 保證有足夠空間
  const dimY = oy - DIM_OFFSET;
  const dimX = ox - DIM_OFFSET;
  const hSlots = [], vSlots = [];

  if (mL > 0) drawDimH(svg, ox - mL * scale, ox, dimY, `${(mL/1000).toFixed(2)}m`, '#cc2200', hSlots);
  drawDimH(svg, ox, ox + aw * scale, dimY, `${(aw/1000).toFixed(2)}m`, '#cc2200', hSlots);
  if (mR > 0) drawDimH(svg, ox + aw * scale, ox + aw * scale + mR * scale, dimY, `${(mR/1000).toFixed(2)}m`, '#cc2200', hSlots);

  if (mT > 0) drawDimV(svg, oy - mT * scale, oy, dimX, `${(mT/1000).toFixed(2)}m`, '#cc2200', vSlots);
  drawDimV(svg, oy, oy + al * scale, dimX, `${(al/1000).toFixed(2)}m`, '#cc2200', vSlots);
  if (mB > 0) drawDimV(svg, oy + al * scale, oy + al * scale + mB * scale, dimX, `${(mB/1000).toFixed(2)}m`, '#cc2200', vSlots);

  area.appendChild(svg);
  lastSVG = new XMLSerializer().serializeToString(svg);
}

// ── 非矩形 PDF 模式 ──
function generatePDF() {
  const sel = [...selectedParcels].filter(k => parsedParcels[k]);
  if (!sel.length) { alert('請先上傳 PDF 並搜尋/點擊選取地號'); return; }

  const plen = gf('plen') || 2278, pwid = gf('pwid') || 1134;
  const gap_mm = gf('gapPdf') || 20, watt = gf('watt') || 580, invKw = gf('inv-kw') || 6;
  const invOver = gb('inv-over');
  const pH_mm = orient === 'v' ? plen : pwid, pW_mm = orient === 'v' ? pwid : plen;
  const pW = pW_mm / PT_TO_REAL_MM, pH = pH_mm / PT_TO_REAL_MM, gap = gap_mm / PT_TO_REAL_MM;

  const allV = sel.flatMap(k => parsedParcels[k].pts);
  const minX = Math.min(...allV.map(v => v[0])), minY = Math.min(...allV.map(v => v[1]));
  const maxX = Math.max(...allV.map(v => v[0])), maxY = Math.max(...allV.map(v => v[1]));
  const bw = maxX - minX, bh = maxY - minY;

  const norm = {};
  sel.forEach(k => { norm[k] = parsedParcels[k].pts.map(v => [v[0] - minX, v[1] - minY]); });

  let panels = [];
  for (let cx = 0; cx + pW <= bw; cx += pW + gap) {
    for (let cy = 0; cy + pH <= bh; cy += pH + gap) {
      const cxm = cx + pW / 2, cym = cy + pH / 2;
      let bt = null;
      for (const k of sel) { if (pointInPoly(cxm, cym, norm[k])) { bt = k; break; } }
      if (bt) panels.push({ x: cx, y: cy, pW, pH, parcel: bt });
    }
  }

  lastPanels = panels;
  const count = panels.length, totalKw = count * watt / 1000;
  const invCap = invOver ? invKw * 1.2 : invKw;
  const fic = (() => { const n = Math.ceil(totalKw / invCap); return totalKw <= n * invCap + 1e-9 ? n : n + 1; })();
  const totalArea = sel.reduce((s, k) => s + (parsedParcels[k].area || 0), 0);
  const pcount = new Set(panels.map(p => p.parcel)).size;
  se('s-count', count); se('s-watt', totalKw.toFixed(2));
  se('s-grid', pcount); se('s-inv', fic); se('s-area', totalArea.toFixed(0));

  const ns = 'http://www.w3.org/2000/svg', fs = getFont();
  const pad = 44;
  const ra = document.getElementById('resultArea');
  ra.style.display = 'flex';
  const canW = Math.max(ra.clientWidth - 16, 360);
  const scale = Math.min((canW - pad * 2) / bw, (canW - pad * 2) * 0.9 / bh);
  const canH = bh * scale + pad * 2 + 20;
  const ox = pad, oy = pad;

  ra.innerHTML = '';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', canW); svg.setAttribute('height', canH);
  svg.setAttribute('viewBox', `0 0 ${canW} ${canH}`);
  svg.setAttribute('xmlns', ns); svg.style.display = 'block';

  // 地號底色
  sel.forEach((k, i) => {
    const color = COLORS[i % COLORS.length];
    const pts = norm[k].map(v => `${(ox + v[0] * scale).toFixed(1)},${(oy + v[1] * scale).toFixed(1)}`).join(' ');
    const pg = document.createElementNS(ns, 'polygon');
    pg.setAttribute('points', pts); pg.setAttribute('fill', '#e8e6e0');
    pg.setAttribute('stroke', color); pg.setAttribute('stroke-width', '1.5'); svg.appendChild(pg);
  });

  // 板子（先畫）
  panels.forEach(p => drawPanel(svg, ox + p.x * scale, oy + p.y * scale, p.pW * scale, p.pH * scale, false));

  // 地號邊框 + 標籤（畫在板子上方）
  sel.forEach((k, i) => {
    const color = COLORS[i % COLORS.length];
    const pts = norm[k].map(v => `${(ox + v[0] * scale).toFixed(1)},${(oy + v[1] * scale).toFixed(1)}`).join(' ');
    const pg = document.createElementNS(ns, 'polygon');
    pg.setAttribute('points', pts); pg.setAttribute('fill', 'none');
    pg.setAttribute('stroke', color); pg.setAttribute('stroke-width', '2'); svg.appendChild(pg);
    const cx3 = norm[k].reduce((s, v) => s + v[0], 0) / norm[k].length;
    const cy3 = norm[k].reduce((s, v) => s + v[1], 0) / norm[k].length;
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', (ox + cx3 * scale).toFixed(1)); t.setAttribute('y', (oy + cy3 * scale + fs * 0.4).toFixed(1));
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', fs + 2);
    t.setAttribute('font-weight', 'bold'); t.setAttribute('fill', color);
    t.setAttribute('font-family', 'sans-serif'); t.textContent = k; svg.appendChild(t);
  });

  // 尺寸標註（完全在板子/地號外側）
  const bwM = (bw * PT_TO_REAL_MM / 1000).toFixed(1), bhM = (bh * PT_TO_REAL_MM / 1000).toFixed(1);
  svgLine(svg, ox, oy - 16, ox + bw * scale, oy - 16, '#888');
  svgLine(svg, ox, oy - 20, ox, oy - 12, '#888');
  svgLine(svg, ox + bw * scale, oy - 20, ox + bw * scale, oy - 12, '#888');
  const t1 = document.createElementNS(ns, 'text');
  t1.setAttribute('x', ox + bw * scale / 2); t1.setAttribute('y', oy - 19);
  t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('font-size', fs);
  t1.setAttribute('fill', '#555'); t1.setAttribute('font-family', 'sans-serif');
  t1.textContent = `${bwM}m`; svg.appendChild(t1);
  svgLine(svg, ox - 16, oy, ox - 16, oy + bh * scale, '#888');
  svgLine(svg, ox - 20, oy, ox - 12, oy, '#888');
  svgLine(svg, ox - 20, oy + bh * scale, ox - 12, oy + bh * scale, '#888');
  const t2 = document.createElementNS(ns, 'text');
  t2.setAttribute('x', ox - 20); t2.setAttribute('y', oy + bh * scale / 2);
  t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('font-size', fs);
  t2.setAttribute('fill', '#555'); t2.setAttribute('font-family', 'sans-serif');
  t2.setAttribute('transform', `rotate(-90,${ox-20},${oy+bh*scale/2})`);
  t2.textContent = `${bhM}m`; svg.appendChild(t2);

  ra.appendChild(svg);
  lastSVG = new XMLSerializer().serializeToString(svg);
  lastVals = { pW, pH, bw, bh, watt, invKw, gap };
}

// ── 下載 ──
function downloadPNG() {
  if (!lastSVG) { alert('請先生成配置圖'); return; }
  const svgEl = document.querySelector(currentMode === 'pdf' ? '#resultArea svg' : '#canvasArea svg');
  if (!svgEl) { alert('找不到圖面'); return; }
  const w = parseInt(svgEl.getAttribute('width')), h = parseInt(svgEl.getAttribute('height'));
  const canvas = document.createElement('canvas');
  canvas.width = w * 2; canvas.height = h * 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w * 2, h * 2);
  const img = new Image();
  const url = URL.createObjectURL(new Blob([lastSVG], { type: 'image/svg+xml;charset=utf-8' }));
  img.onload = () => { ctx.scale(2, 2); ctx.drawImage(img, 0, 0);
    const a = document.createElement('a'); a.href = canvas.toDataURL('image/png');
    a.download = 'solar_layout.png'; a.click(); URL.revokeObjectURL(url); };
  img.src = url;
}

function downloadDXF() {
  if (!lastPanels.length) { alert('請先生成配置圖'); return; }
  const { pW, pH, aw, al } = lastVals;
  const isPdf = currentMode === 'pdf';
  const toMM = isPdf ? PT_TO_REAL_MM : 1;
  let dxf = '0\nSECTION\n2\nHEADER\n9\n$INSUNITS\n70\n4\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n';
  const rDXF = (x, y, w, h, layer) => {
    const pts = [[x,y],[x+w,y],[x+w,y+h],[x,y+h],[x,y]]; let s = '';
    for (let i = 0; i < 4; i++)
      s += `0\nLINE\n8\n${layer}\n10\n${(pts[i][0]*toMM).toFixed(2)}\n20\n${(pts[i][1]*toMM).toFixed(2)}\n30\n0.00\n11\n${(pts[i+1][0]*toMM).toFixed(2)}\n21\n${(pts[i+1][1]*toMM).toFixed(2)}\n31\n0.00\n`;
    return s;
  };
  if (!isPdf) rDXF(0, 0, aw, al, 'BOUNDARY');
  lastPanels.forEach(p => { dxf += rDXF(p.x, p.y, p.pW || pW, p.pH || pH, p.parcel || 'SOLAR_PANEL'); });
  dxf += '0\nENDSEC\n0\nEOF\n';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([dxf], { type: 'text/plain' }));
  a.download = 'solar_layout.dxf'; a.click();
}
